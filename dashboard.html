<script>
/* ========================================
 * 灵山胜境数据大屏 - ECharts 可视化
 * ======================================== */

// ========== 全局图表实例 ==========
let heatmapChart, barChart, trendChart, wordCloudChart;

// ========== 工具函数 ==========

/**
 * easeOutCubic 缓动函数
 * @param {number} t - 进度 [0, 1]
 */
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

/**
 * 数字滚动动画
 * @param {HTMLElement} el - 目标元素
 * @param {number} target - 目标数值
 * @param {number} duration - 动画时长（毫秒）
 * @param {boolean} isPercent - 是否为百分比
 * @param {boolean} isDecimal - 是否保留小数
 */
function animateNumber(el, target, duration, isPercent, isDecimal) {
  const start = 0;
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easedProgress = easeOutCubic(progress);
    const current = start + (target - start) * easedProgress;

    if (isPercent) {
      el.textContent = current.toFixed(1) + '%';
    } else if (isDecimal) {
      el.textContent = current.toFixed(1);
    } else {
      el.textContent = Math.floor(current).toLocaleString();
    }

    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }
  requestAnimationFrame(update);
}

// ========== 实时时钟 ==========
function updateTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('timeDisplay').textContent = y + '年' + m + '月' + d + '日 ' + h + ':' + min + ':' + s;
}
setInterval(updateTime, 1000);
updateTime();

// ========== KPI数字滚动初始化 ==========
function initKPI() {
  const dash = LingshanData.dashboard;
  animateNumber(document.getElementById('totalVisitors'), dash.totalVisitors, 2000, false, false);
  animateNumber(document.getElementById('currentVisitors'), dash.currentVisitors, 2000, false, false);
  animateNumber(document.getElementById('satisfaction'), dash.satisfaction, 2000, true, false);
  animateNumber(document.getElementById('aiChats'), dash.aiChats, 2000, false, false);
}

// KPI 每30秒小幅波动模拟实时更新
function kpiFluctuation() {
  const dash = LingshanData.dashboard;
  const ids = ['totalVisitors', 'currentVisitors', 'aiChats'];
  const bases = [dash.totalVisitors, dash.currentVisitors, dash.aiChats];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    const currentVal = parseInt(el.textContent.replace(/,/g, '')) || bases[i];
    const fluctuation = Math.floor(Math.random() * 60 - 30); // -30 ~ +30
    const newVal = currentVal + fluctuation;
    animateNumber(el, newVal, 800, false, false);
  });
  // 满意度小幅波动
  const satEl = document.getElementById('satisfaction');
  const currentSat = parseFloat(satEl.textContent) || dash.satisfaction;
  const satFluc = (Math.random() * 0.4 - 0.2);
  const newSat = Math.min(99.9, Math.max(90, currentSat + satFluc));
  animateNumber(satEl, newSat, 800, true, false);
}
setInterval(kpiFluctuation, 30000);

// ========== 热力图 ==========
function initHeatmap() {
  heatmapChart = echarts.init(document.getElementById('heatmapChart'));

  // 景点名称（取前8个主要景点）
  const spotNames = LingshanData.spots.slice(0, 8).map(s => s.name);
  // 时间段 08:00-17:00
  const hours = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];

  // 根据todayVisitors按时段分配数据（模拟客流分布）
  // 模式：上午逐渐增多，中午高峰，下午逐渐减少
  const distribution = [0.04, 0.08, 0.14, 0.16, 0.12, 0.10, 0.14, 0.12, 0.06, 0.04];
  const data = [];
  let maxVal = 0;

  LingshanData.spots.slice(0, 8).forEach((spot, yIdx) => {
    hours.forEach((hour, xIdx) => {
      // 基础值 + 随机波动
      const base = spot.todayVisitors * distribution[xIdx];
      const noise = base * (Math.random() * 0.3 - 0.15);
      const val = Math.max(0, Math.round(base + noise));
      data.push([xIdx, yIdx, val]);
      if (val > maxVal) maxVal = val;
    });
  });

  const option = {
    tooltip: {
      position: 'top',
      backgroundColor: 'rgba(20, 25, 40, 0.9)',
      borderColor: 'rgba(74, 143, 168, 0.3)',
      textStyle: { color: '#E8E8F0', fontSize: 13 },
      formatter: function(params) {
        return spotNames[params.value[1]] + '<br/>' +
               hours[params.value[0]] + '  客流量: <b>' + params.value[2] + '</b> 人';
      }
    },
    grid: {
      top: 10, bottom: 50, left: 100, right: 30
    },
    xAxis: {
      type: 'category',
      data: hours,
      splitArea: { show: false },
      axisLabel: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(74,143,168,0.2)' } },
      axisTick: { show: false }
    },
    yAxis: {
      type: 'category',
      data: spotNames,
      splitArea: { show: false },
      axisLabel: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(74,143,168,0.2)' } },
      axisTick: { show: false }
    },
    visualMap: {
      min: 0,
      max: maxVal,
      calculable: false,
      orient: 'horizontal',
      left: 'center',
      bottom: 0,
      itemWidth: 12,
      itemHeight: 120,
      textStyle: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      inRange: {
        color: ['#2B5F75', '#4A8FA8', '#FF9800', '#C73E3A']
      }
    },
    series: [{
      name: '客流量',
      type: 'heatmap',
      data: data,
      label: {
        show: true,
        color: 'rgba(232,232,240,0.7)',
        fontSize: 10
      },
      emphasis: {
        itemStyle: {
          shadowBlur: 10,
          shadowColor: 'rgba(199, 62, 58, 0.5)'
        }
      },
      itemStyle: {
        borderColor: 'rgba(10, 10, 15, 0.6)',
        borderWidth: 2,
        borderRadius: 4
      }
    }]
  };

  heatmapChart.setOption(option);
}

// ========== 景点热度柱状图 ==========
function initBarChart() {
  barChart = echarts.init(document.getElementById('barChart'));

  // 按todayVisitors降序排列
  const spotsData = LingshanData.spots.slice(0, 8)
    .map(s => ({ name: s.name, value: s.todayVisitors }))
    .sort((a, b) => a.value - b.value);

  const names = spotsData.map(s => s.name);
  const values = spotsData.map(s => s.value);
  const maxVal = Math.max(...values);

  const option = {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      backgroundColor: 'rgba(20, 25, 40, 0.9)',
      borderColor: 'rgba(74, 143, 168, 0.3)',
      textStyle: { color: '#E8E8F0', fontSize: 13 },
      formatter: function(params) {
        return params[0].name + '<br/>今日客流: <b>' + params[0].value.toLocaleString() + '</b> 人';
      }
    },
    grid: {
      top: 20, bottom: 30, left: 100, right: 40
    },
    xAxis: {
      type: 'value',
      axisLabel: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(74,143,168,0.2)' } },
      splitLine: { lineStyle: { color: 'rgba(74,143,168,0.08)' } }
    },
    yAxis: {
      type: 'category',
      data: names,
      axisLabel: { color: 'rgba(232,232,240,0.6)', fontSize: 12 },
      axisLine: { show: false },
      axisTick: { show: false }
    },
    series: [{
      type: 'bar',
      data: values,
      barWidth: '55%',
      label: {
        show: true,
        position: 'right',
        color: 'rgba(232,232,240,0.7)',
        fontSize: 12,
        formatter: function(params) { return params.value.toLocaleString(); }
      },
      itemStyle: {
        borderRadius: [0, 6, 6, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#2B5F75' },
          { offset: 1, color: '#4A8FA8' }
        ])
      },
      emphasis: {
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: '#C73E3A' },
            { offset: 1, color: '#E85D5D' }
          ])
        }
      },
      // 入场动画
      animationDuration: 1500,
      animationEasing: 'cubicOut'
    }]
  };

  barChart.setOption(option);
}

// ========== 客流趋势折线图 ==========
function initTrendChart() {
  trendChart = echarts.init(document.getElementById('trendChart'));

  // 生成最近7天日期
  const dates = [];
  const now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    dates.push((d.getMonth() + 1) + '/' + d.getDate());
  }

  // 模拟7天数据（基于dashboard数据波动）
  const baseVisitors = LingshanData.dashboard.totalVisitors;
  const baseChats = LingshanData.dashboard.aiChats;
  const visitorData = [];
  const chatData = [];

  for (let i = 0; i < 7; i++) {
    // 周末客流量更高
    const dayOfWeek = new Date(now.getTime() - (6 - i) * 86400000).getDay();
    const weekendBoost = (dayOfWeek === 0 || dayOfWeek === 6) ? 1.3 : 1.0;
    const vFluc = 0.85 + Math.random() * 0.3;
    visitorData.push(Math.round(baseVisitors * vFluc * weekendBoost));
    const cFluc = 0.8 + Math.random() * 0.4;
    chatData.push(Math.round(baseChats * cFluc * weekendBoost));
  }

  const option = {
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(20, 25, 40, 0.9)',
      borderColor: 'rgba(74, 143, 168, 0.3)',
      textStyle: { color: '#E8E8F0', fontSize: 13 }
    },
    legend: {
      data: ['总客流量', 'AI对话次数'],
      top: 0,
      right: 0,
      textStyle: { color: 'rgba(232,232,240,0.6)', fontSize: 11 },
      itemWidth: 16, itemHeight: 3
    },
    grid: {
      top: 35, bottom: 30, left: 50, right: 20
    },
    xAxis: {
      type: 'category',
      data: dates,
      boundaryGap: false,
      axisLabel: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      axisLine: { lineStyle: { color: 'rgba(74,143,168,0.2)' } },
      axisTick: { show: false }
    },
    yAxis: {
      type: 'value',
      axisLabel: { color: 'rgba(232,232,240,0.5)', fontSize: 11 },
      axisLine: { show: false },
      splitLine: { lineStyle: { color: 'rgba(74,143,168,0.08)' } }
    },
    series: [
      {
        name: '总客流量',
        type: 'line',
        smooth: true,
        symbol: 'circle',
        symbolSize: 6,
        data: visitorData,
        lineStyle: { color: '#4A8FA8', width: 2 },
        itemStyle: { color: '#4A8FA8' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(74, 143, 168, 0.35)' },
            { offset: 1, color: 'rgba(74, 143, 168, 0.02)' }
          ])
        }
      },
      {
        name: 'AI对话次数',
        type: 'line',
        smooth: true,
        symbol: 'circle',
        symbolSize: 6,
        data: chatData,
        lineStyle: { color: '#C73E3A', width: 2 },
        itemStyle: { color: '#C73E3A' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(199, 62, 58, 0.3)' },
            { offset: 1, color: 'rgba(199, 62, 58, 0.02)' }
          ])
        }
      }
    ],
    animationDuration: 2000,
    animationEasing: 'cubicOut'
  };

  trendChart.setOption(option);
}

// ========== 实时对话列表动态更新 ==========
const presetConversations = [
  { question: '灵山大佛有多高？抱佛脚需要另外收费吗？', tag: '景点信息', tagClass: '' },
  { question: '帮我规划一条5小时的游览路线，要包含梵宫和九龙灌浴表演', tag: '路线规划', tagClass: 'route' },
  { question: '祥符禅寺的历史有多久？玄奘法师和小灵山有什么关系？', tag: '历史讲解', tagClass: 'history' },
  { question: '《吉祥颂》演出今天还有吗？几点开始？', tag: '服务咨询', tagClass: 'service' },
  { question: '九龙灌浴表演几点开始？需要提前占位吗？', tag: '表演时间', tagClass: 'service' },
  { question: '五印坛城里面可以拍照吗？转经筒怎么使用？', tag: '景点信息', tagClass: '' },
  { question: '从灵山大佛到梵宫走路要多久？有观光车吗？', tag: '路线规划', tagClass: 'route' },
  { question: '景区内有素斋餐厅吗？在哪里？价格怎么样？', tag: '餐饮服务', tagClass: 'service' },
  { question: '梵宫的穹顶天象图是用什么材料做的？', tag: '历史讲解', tagClass: 'history' },
  { question: '带孩子来玩，推荐哪些景点适合小朋友？', tag: '亲子推荐', tagClass: 'route' }
];

let conversationIndex = 0;
const maxVisibleConversations = 5;

/**
 * 初始化对话列表（显示前5条）
 */
function initConversations() {
  const list = document.getElementById('conversationList');
  const initialCount = Math.min(5, presetConversations.length);
  for (let i = 0; i < initialCount; i++) {
    const conv = presetConversations[i];
    list.appendChild(createConversationItem(conv, '刚刚'));
  }
  conversationIndex = initialCount;
}

/**
 * 创建对话DOM元素
 */
function createConversationItem(conv, timeText, isHighlight) {
  const item = document.createElement('div');
  item.className = 'conversation-item' + (isHighlight ? ' highlight' : '');
  item.innerHTML =
    '<div class="avatar">&#x1F916;</div>' +
    '<div class="content">' +
      '<div class="question">"' + conv.question + '"</div>' +
      '<div class="meta">' +
        '<span>' + timeText + '</span>' +
        '<span class="tag ' + conv.tagClass + '">' + conv.tag + '</span>' +
      '</div>' +
    '</div>';
  return item;
}

/**
 * 每8秒添加一条新对话
 */
function addNewConversation() {
  const list = document.getElementById('conversationList');
  const conv = presetConversations[conversationIndex % presetConversations.length];
  conversationIndex++;

  const newItem = createConversationItem(conv, '刚刚', true);
  // 插入到列表顶部
  list.insertBefore(newItem, list.firstChild);

  // 限制最大显示数量
  while (list.children.length > maxVisibleConversations) {
    list.removeChild(list.lastChild);
  }

  // 2秒后移除高亮
  setTimeout(function() {
    newItem.classList.remove('highlight');
  }, 2000);
}

// ========== 刷新数据 ==========
function refreshData() {
  // 重新触发KPI滚动动画
  initKPI();

  // 刷新热力图数据
  initHeatmap();

  // 刷新柱状图
  initBarChart();

  // 刷新趋势图
  initTrendChart();

  // 刷新词云
  initWordCloud();
}

// ========== 窗口resize自适应 ==========
window.addEventListener('resize', function() {
  if (heatmapChart) heatmapChart.resize();
  if (barChart) barChart.resize();
  if (trendChart) trendChart.resize();
  if (wordCloudChart) wordCloudChart.resize();
});

// ========== 页面加载初始化 ==========
window.addEventListener('DOMContentLoaded', function() {
  // 初始化KPI数字滚动
  initKPI();

  // 初始化所有ECharts图表
  initHeatmap();
  initBarChart();
  initTrendChart();
  initWordCloud();

  // 初始化对话列表
  initConversations();

  // 每8秒添加一条新对话
  setInterval(addNewConversation, 8000);
});
</script>
