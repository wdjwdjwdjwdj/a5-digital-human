.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 300;

  flex-direction: column;
  gap: 10px;
}

  box-shadow: 0 8px 30px rgba(0,0,0,0.12);

  color: var(--text-primary);
  min-width: 280px;
  max-width: 400px;
  transform: translateX(120%);

}
.toast.removing {
  animation: toastOut 0.3s forwards;
}
.toast-icon {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

  fill: #fff;
}
.toast.success .toast-icon { background: var(--success); }
.toast.error .toast-icon { background: var(--accent); }
.toast.info .toast-icon { background: var(--primary); }

@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes toastOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(120%); opacity: 0; }
}

.empty-state {

/* Responsive */
@media (max-width: 1024px) {

}
@media (max-width: 768px) {
  .main-content { margin-left: 0; }
  .sidebar { transform: translateX(-100%); }
  .stats-row { grid-template-columns: 1fr; }
  .filter-bar { flex-wrap: wrap; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

<script>
/* ========================================
 * 灵山胜境管理后台 - 交互逻辑
 * ======================================== */

// ---- 全局状态 ----
let spotsData = [];           // 主数据列表（含状态字段）
let filteredData = [];        // 筛选后的数据
let currentPage = 1;          // 当前页码
const pageSize = 5;           // 每页条数
let selectedIds = new Set();  // 已选中的景点 id
let editingId = null;         // 当前正在编辑的景点 id（null 表示新增模式）
let deletingId = null;        // 待删除的景点 id
let sortField = '';           // 当前排序字段
let sortOrder = 'asc';       // 排序方向：asc / desc

// 状态列表及随机分配
const statusList = ['online', 'offline', 'maintenance'];
const statusMap = {
  online: '上线中',
  offline: '已下线',
  maintenance: '维护中'
};

// ---- 初始化 ----
function init() {
  // 从 LingshanData.spots 读取数据，并补充状态字段
  spotsData = LingshanData.spots.map(function(spot) {
    return Object.assign({}, spot, {
      status: statusList[Math.floor(Math.random() * statusList.length)]
    });
  });

  // 动态生成类型筛选下拉
  initTypeFilter();
  // 更新统计卡片
  updateStats();
  // 首次渲染
  handleFilter();
}

// ---- 统计卡片更新 ----
function updateStats() {
  var totalVisitors = 0;
  var totalChats = 0;
  var totalRating = 0;
  spotsData.forEach(function(s) {
    totalVisitors += (s.todayVisitors || 0);
    totalChats += (s.aiChats || 0);
    totalRating += (s.rating || 0);
  });
  document.getElementById('statTotal').textContent = spotsData.length;
  document.getElementById('statVisitors').textContent = totalVisitors.toLocaleString();
  document.getElementById('statChats').textContent = totalChats.toLocaleString();
  var avg = spotsData.length > 0 ? (totalRating / spotsData.length * 20).toFixed(1) : '0';
  document.getElementById('statSatisfaction').textContent = avg + '%';
}

// ---- 动态生成类型筛选选项 ----
function initTypeFilter() {
  var typeSet = new Set();
  spotsData.forEach(function(s) { typeSet.add(s.category); });
  var select = document.getElementById('filterType');
  // 清空并保留"全部类型"
  select.innerHTML = '<option value="">全部类型</option>';
  typeSet.forEach(function(type) {
    var opt = document.createElement('option');
    opt.value = type;
    opt.textContent = type;
    select.appendChild(opt);
  });
}

// ---- 筛选逻辑（搜索 + 类型 + 状态） ----
function handleFilter() {
  var keyword = document.getElementById('filterSearch').value.trim().toLowerCase();
  var typeVal = document.getElementById('filterType').value;
  var statusVal = document.getElementById('filterStatus').value;

  filteredData = spotsData.filter(function(spot) {
    // 名称模糊匹配
    if (keyword && spot.name.toLowerCase().indexOf(keyword) === -1) return false;
    // 类型筛选
    if (typeVal && spot.category !== typeVal) return false;
    // 状态筛选
    if (statusVal && spot.status !== statusVal) return false;
    return true;
  });

  // 应用排序
  applySorting();

  // 重置到第一页
  currentPage = 1;
  // 清空选中
  selectedIds.clear();
  updateSelectAllState();

  renderTable();
  renderPagination();
}

// ---- 排序逻辑 ----
function applySorting() {
  if (!sortField) return;
  filteredData.sort(function(a, b) {
    var valA = a[sortField] || 0;
    var valB = b[sortField] || 0;
    return sortOrder === 'asc' ? (valA - valB) : (valB - valA);
  });
}

// 点击表头排序
function handleSortClick(field) {
  if (sortField === field) {
    // 同一字段切换升降序
    sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    sortField = field;
    sortOrder = 'desc'; // 默认降序
  }
  // 同步下拉框
  document.getElementById('filterSort').value = field;
  // 更新表头样式
  updateSortHeaders();
  applySorting();
  renderTable();
}

// 下拉框排序
function handleSort() {
  var val = document.getElementById('filterSort').value;
  if (!val) {
    sortField = '';
    sortOrder = 'asc';
    updateSortHeaders();
  } else {
    if (sortField !== val) {
      sortField = val;
      sortOrder = 'desc';
    }
  }
  applySorting();
  renderTable();
}

// 更新排序表头样式
function updateSortHeaders() {
  var headers = document.querySelectorAll('.data-table th.sortable');
  headers.forEach(function(th) {
    th.classList.remove('asc', 'desc');
    if (th.dataset.sort === sortField) {
      th.classList.add(sortOrder);
    }
  });
}

// ---- 表格渲染 ----
function renderTable() {
  var tbody = document.getElementById('tableBody');
  var start = (currentPage - 1) * pageSize;
  var end = start + pageSize;
  var pageData = filteredData.slice(start, end);

  if (pageData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8">' +
      '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>' +
      '<p>暂无匹配的景点数据</p>' +
      '</div></td></tr>';
    return;
  }

  var html = '';
  pageData.forEach(function(spot) {
    var heatPercent = Math.round((spot.rating / 5) * 100);
    var checked = selectedIds.has(spot.id) ? ' checked' : '';
    var statusClass = spot.status;
    var statusText = statusMap[spot.status] || spot.status;

    html += '<tr>' +
      '<td><input type="checkbox" data-id="' + spot.id + '"' + checked + ' onchange="handleRowCheck(this)"></td>' +
      '<td>' +
        '<div class="spot-info">' +
          '<div class="spot-thumb">' + (spot.icon || '📍') + '</div>' +
          '<div>' +
            '<div class="spot-name">' + spot.name + '</div>' +
            '<div class="spot-type">' + (spot.description || '').substring(0, 20) + (spot.description && spot.description.length > 20 ? '...' : '') + '</div>' +
          '</div>' +
        '</div>' +
      '</td>' +
      '<td>' + spot.category + '</td>' +
      '<td><span class="status-badge ' + statusClass + '"><span class="dot"></span>' + statusText + '</span></td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="heat-bar"><div class="heat-bar-fill" style="width:' + heatPercent + '%"></div></div>' +
          '<span style="font-size:12px;color:var(--text-muted)">' + spot.rating + '</span>' +
        '</div>' +
      '</td>' +
      '<td>' + (spot.todayVisitors || 0).toLocaleString() + '</td>' +
      '<td>' + (spot.aiChats || 0).toLocaleString() + '</td>' +
      '<td>' +
        '<div class="action-btns">' +
          '<button class="action-btn" title="编辑" onclick="openEditModal(\'' + spot.id + '\')">' +
            '<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>' +
          '</button>' +
          '<button class="action-btn delete" title="删除" onclick="openConfirmModal(\'' + spot.id + '\')">' +
            '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>' +
          '</button>' +
        '</div>' +
      '</td>' +
    '</tr>';
  });

  tbody.innerHTML = html;
}

// ---- 分页渲染 ----
function renderPagination() {
  var total = filteredData.length;
  var totalPages = Math.max(1, Math.ceil(total / pageSize));

  document.getElementById('paginationInfo').textContent =
    '共 ' + total + ' 条记录，每页 ' + pageSize + ' 条';

  var container = document.getElementById('paginationBtns');
  var html = '';

  // 上一页按钮
  html += '<button class="page-btn"' + (currentPage <= 1 ? ' disabled' : '') +
    ' onclick="goToPage(' + (currentPage - 1) + ')">&lt;</button>';

  // 页码按钮（最多显示 7 个）
  var startPage = Math.max(1, currentPage - 3);
  var endPage = Math.min(totalPages, startPage + 6);
  if (endPage - startPage < 6) {
    startPage = Math.max(1, endPage - 6);
  }

  for (var i = startPage; i <= endPage; i++) {
    html += '<button class="page-btn' + (i === currentPage ? ' active' : '') +
      '" onclick="goToPage(' + i + ')">' + i + '</button>';
  }

  // 下一页按钮
  html += '<button class="page-btn"' + (currentPage >= totalPages ? ' disabled' : '') +
    ' onclick="goToPage(' + (currentPage + 1) + ')">&gt;</button>';

  container.innerHTML = html;
}

// 切换页码
function goToPage(page) {
  var totalPages = Math.ceil(filteredData.length / pageSize);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  selectedIds.clear();
  updateSelectAllState();
  renderTable();
  renderPagination();
}

// ---- 全选 / 单选逻辑 ----
function handleSelectAll() {
  var isChecked = document.getElementById('selectAll').checked;
  var start = (currentPage - 1) * pageSize;
  var end = start + pageSize;
  var pageData = filteredData.slice(start, end);

  pageData.forEach(function(spot) {
    if (isChecked) {
      selectedIds.add(spot.id);
    } else {
      selectedIds.delete(spot.id);
    }
  });
  renderTable();
}

function handleRowCheck(checkbox) {
  var id = checkbox.dataset.id;
  if (checkbox.checked) {
    selectedIds.add(id);
  } else {
    selectedIds.delete(id);
  }
  updateSelectAllState();
}

// 更新全选 checkbox 状态
function updateSelectAllState() {
  var start = (currentPage - 1) * pageSize;
  var end = start + pageSize;
  var pageData = filteredData.slice(start, end);
  var allChecked = pageData.length > 0 && pageData.every(function(s) {
    return selectedIds.has(s.id);
  });
  document.getElementById('selectAll').checked = allChecked;
}

// ---- 新增景点模态框 ----
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增景点';
  document.getElementById('formName').value = '';
  document.getElementById('formType').value = '佛像';
  document.getElementById('formStatus').value = 'online';
  document.getElementById('formDesc').value = '';
  clearFormErrors();
  showModal('spotModal');
}

// ---- 编辑景点模态框 ----
function openEditModal(id) {
  var spot = spotsData.find(function(s) { return s.id === id; });
  if (!spot) return;

  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑景点';
  document.getElementById('formName').value = spot.name;
  document.getElementById('formType').value = spot.category;
  document.getElementById('formStatus').value = spot.status;
  document.getElementById('formDesc').value = spot.description || '';
  clearFormErrors();
  showModal('spotModal');
}

// ---- 保存景点（新增/编辑） ----
function saveSpot() {
  var name = document.getElementById('formName').value.trim();
  var type = document.getElementById('formType').value;
  var status = document.getElementById('formStatus').value;
  var desc = document.getElementById('formDesc').value.trim();

  // 表单验证
  clearFormErrors();
  if (!name) {
    document.getElementById('nameGroup').classList.add('has-error');
    return;
  }

  if (editingId) {
    // 编辑模式
    var spot = spotsData.find(function(s) { return s.id === editingId; });
    if (spot) {
      spot.name = name;
      spot.category = type;
      spot.status = status;
      spot.description = desc;
      showToast('景点 "' + name + '" 编辑成功', 'success');
    }
  } else {
    // 新增模式
    var newSpot = {
      id: 'spot-' + Date.now(),
      name: name,
      category: type,
      icon: '📍',
      rating: 4.0,
      reviews: 0,
      tag: '新增',
      color: '#2B5F75',
      coordinates: [31.4285, 120.0885],
      description: desc,
      detail: desc,
      builtYear: '新增景点',
      highlights: [],
      audioDuration: '00:00',
      todayVisitors: 0,
      aiChats: 0,
      status: status
    };
    spotsData.push(newSpot);
    showToast('景点 "' + name + '" 新增成功', 'success');
  }

  closeSpotModal();
  initTypeFilter();
  updateStats();
  handleFilter();
}

// 清除表单错误
function clearFormErrors() {
  document.getElementById('nameGroup').classList.remove('has-error');
}

// 关闭景点模态框
function closeSpotModal() {
  hideModal('spotModal');
}

// ---- 删除确认模态框 ----
function openConfirmModal(id) {
  var spot = spotsData.find(function(s) { return s.id === id; });
  if (!spot) return;
  deletingId = id;
  document.getElementById('confirmSpotName').textContent = spot.name;
  showModal('confirmModal');
}

function closeConfirmModal() {
  hideModal('confirmModal');
  deletingId = null;
}

// 确认删除
function confirmDelete() {
  if (!deletingId) return;
  var spot = spotsData.find(function(s) { return s.id === deletingId; });
  var name = spot ? spot.name : '';
  spotsData = spotsData.filter(function(s) { return s.id !== deletingId; });
  selectedIds.delete(deletingId);
  closeConfirmModal();
  initTypeFilter();
  updateStats();
  handleFilter();
  showToast('景点 "' + name + '" 已删除', 'error');
}

// ---- 模态框通用方法 ----
function showModal(id) {
  document.getElementById(id).classList.add('active');
}
function hideModal(id) {
  document.getElementById(id).classList.remove('active');
}

// 点击遮罩层关闭模态框
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      overlay.classList.remove('active');
      editingId = null;
      deletingId = null;
    }
  });
});

// ---- Toast 通知系统 ----
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');

  var iconSvg = '';
  if (type === 'success') {
    iconSvg = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
  } else if (type === 'error') {
    iconSvg = '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
  } else {
    iconSvg = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
  }

  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<div class="toast-icon">' + iconSvg + '</div><span>' + message + '</span>';
  container.appendChild(toast);

  // 3秒后自动消失
  setTimeout(function() {
    toast.classList.add('removing');
    setTimeout(function() {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 300);
  }, 3000);
}

// ---- 侧边栏折叠 ----
function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  var main = document.getElementById('mainContent');
  sidebar.classList.toggle('collapsed');
  main.classList.toggle('sidebar-collapsed');
}

// ---- 页面加载后初始化 ----
window.addEventListener('DOMContentLoaded', init);
</script>
