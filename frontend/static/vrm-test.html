<!DOCTYPE html>
<html>
<head>
<title>VRM Test</title>
<style>
body { margin: 0; background: #222; color: #fff; font-family: monospace; }
canvas { display: block; margin: 20px auto; border: 2px solid #555; }
#log { padding: 10px 20px; white-space: pre-wrap; font-size: 13px; max-height: 300px; overflow-y: auto; }
.err { color: #f55; } .ok { color: #5f5; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js"
  }
}
</script>
</head>
<body>
<canvas id="c" width="400" height="500"></canvas>
<div id="log"></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';

const logEl = document.getElementById('log');
function log(msg, cls) {
  const d = document.createElement('div');
  d.className = cls || '';
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

log('Three.js version: ' + THREE.REVISION);
log('VRMLoaderPlugin: ' + (typeof VRMLoaderPlugin));

const canvas = document.getElementById('c');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, 400/500, 0.1, 20);
camera.position.set(0, 1.3, 2.0);

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(400, 500);

scene.add(new THREE.DirectionalLight(0xffffff, 0.8).translateX(1).translateY(1).translateZ(1));
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

log('Loading VRM model...');
try {
  const gltf = await loader.loadAsync('/static/vrm/AliciaSolid.vrm');
  log('GLTF loaded! userData keys: ' + Object.keys(gltf.userData), 'ok');

  const vrm = gltf.userData.vrm;
  if (vrm) {
    log('VRM object found', 'ok');
    scene.add(vrm.scene);
    vrm.scene.rotation.y = Math.PI;
    if (vrm.humanoid) log('Humanoid bones: ' + Object.keys(vrm.humanoid.humanBones).length, 'ok');
    if (vrm.expressionManager) log('Expressions: ' + vrm.expressionManager.expressions.map(e => e.expressionName).join(', '), 'ok');
    if (vrm.blendShapeProxy) vrm.blendShapeProxy.setAutoBlinkEnabled(true);
  } else {
    log('No VRM in userData!', 'err');
    scene.add(gltf.scene);
  }

  // Count meshes and textures
  let meshCount = 0, texCount = 0;
  gltf.scene.traverse(obj => {
    if (obj.isMesh) meshCount++;
    if (obj.material) {
      const mat = obj.material;
      if (mat.map) texCount++;
    }
  });
  log(`Scene: ${meshCount} meshes, ${texCount} textured materials`);

} catch(err) {
  log('Load FAILED: ' + err.message, 'err');
  log('Stack: ' + err.stack, 'err');
}

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  scene.traverse(obj => { if (obj.userData?.vrm) obj.userData.vrm.update(delta); });
  renderer.render(scene, camera);
}
animate();
log('Animation loop started', 'ok');
</script>
</body>
</html>
