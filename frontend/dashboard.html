<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据大屏 · 灵山胜境 AI 数字人</title>
<style>
:root {
  --bg-dark: #0f1923;
  --bg-card: #162231;
  --bg-card-hover: #1c2e42;
  --border: rgba(74,143,168,.2);
  --primary: #4A8FA8;
  --primary-light: #6BB5D0;
  --accent: #E85D5D;
  --success: #4CAF50;
  --warning: #FF9800;
  --text: #e0e6ed;
  --text-secondary: #8899aa;
  --text-muted: #5a6d7e;
  --font-sans: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --radius: 14px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
/* 顶部导航 */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 24px;
  background: var(--bg-card);
  border-bottom:1px solid var(--border);
  position: sticky; top:0; z-index:100;
  backdrop-filter: blur(12px);
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar-left h1 { font-size:20px; font-weight:700; background:linear-gradient(135deg,#4A8FA8,#6BB5D0,#4A8FA8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.topbar-left .badge {
  padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;
  background:rgba(74,143,168,.15); color:var(--primary-light);
  border:1px solid var(--border);
}
.topbar-right { display:flex; gap:10px; align-items:center; }
.topbar-right .live-dot { width:8px;height:8px;background:var(--success);border-radius:50%;animation:pulse 2s infinite; }
.topbar-right .live-text { font-size:13px; color:var(--success); font-weight:500; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--success)} 50%{opacity:.4;box-shadow:0 0 2px var(--success)} }

.btn-back {
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  color:var(--text-secondary); font-size:13px; cursor:pointer;
  text-decoration:none; transition:all .2s;
}
.btn-back:hover { background:rgba(255,255,255,.1); color:var(--text); }

/* 网格布局 */
.dashboard {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 20px 24px;
  max-width: 1600px;
  margin: 0 auto;
}

/* 卡片 */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.card:hover { background: var(--bg-card-hover); border-color: rgba(74,143,168,.35); }
.card-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.card-header h3 { font-size:15px; font-weight:600; color:var(--text); }
.card-header .icon { font-size:22px; }

/* 统计数字卡 */
.stat-card {
  display:flex; flex-direction:column; gap:8px;
}
.stat-value {
  font-size:36px; font-weight:800;
  background:linear-gradient(135deg,var(--primary-light),#8ecae6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1;
}
.stat-label { font-size:13px; color:var(--text-muted); }
.stat-change { font-size:12px; display:flex; align-items:center; gap:4px; }
.stat-change.up { color:var(--success); }
.stat-change.down { color:var(--accent); }

/* 排行榜 */
.rank-list { display:flex; flex-direction:column; gap:10px; }
.rank-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,.02);
  transition:all .2s;
}
.rank-item:hover { background:rgba(255,255,255,.05); }
.rank-num {
  width:26px;height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
}
.rank-num.top1 { background:linear-gradient(135deg,#FFD700,#FFA000); color:#1a1a1a; }
.rank-num.top2 { background:linear-gradient(135deg,#C0C0C0,#909090); color:#1a1a1a; }
.rank-num.top3 { background:linear-gradient(135deg,#CD7F32,#8B6914); color:#fff; }
.rank-num.normal { background:rgba(74,143,168,.15); color:var(--primary-light); }
.rank-info { flex:1; }
.rank-info .name { font-size:14px; font-weight:500; }
.rank-info .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
.rank-value { font-size:14px; font-weight:600; color:var(--primary-light); }

/* 进度条 */
.progress-bar {
  height:8px; border-radius:4px; background:rgba(255,255,255,.06);
  margin-top:8px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:4px;
  background:linear-gradient(90deg,var(--primary),var(--primary-light));
  transition:width .8s cubic-bezier(.22,.61,.36,1);
}

/* 图表容器 */
.chart-area {
  width:100%; height:200px;
  display:flex; align-items:flex-end; gap:6px;
  padding-top:20px;
}
.chart-bar {
  flex:1; border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,var(--primary-light),var(--primary));
  transition:height .6s cubic-bezier(.22,.61,.36,1);
  position:relative;
  min-width:12px;
}
.chart-bar .bar-label {
  position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
  font-size:10px; color:var(--text-muted); white-space:nowrap;
}

/* AI 对话统计 */
.conv-list { display:flex; flex-direction:column; gap:8px; }
.conv-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; border-radius:8px;
  background:rgba(255,255,255,.02);
}
.conv-item .tag {
  padding:2px 8px; border-radius:6px; font-size:11px; font-weight:500;
}
.conv-item .tag.happy { background:rgba(76,175,80,.15); color:var(--success); }
.conv-item .tag.neutral { background:rgba(158,158,158,.15); color:#bdbdbd; }
.conv-item .tag.surprise { background:rgba(255,152,0,.15); color:var(--warning); }
.conv-item .tag.sad { background:rgba(232,93,93,.15); color:var(--accent); }
.conv-item .conv-text { flex:1; font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.conv-item .conv-time { font-size:11px; color:var(--text-muted); }

/* 活动时间线 */
.timeline { display:flex; flex-direction:column; gap:12px; position:relative; }
.timeline::before {
  content:''; position:absolute; left:7px; top:0; bottom:0;
  width:2px; background:var(--border);
}
.tl-item { display:flex; gap:14px; padding-left:4px; position:relative; }
.tl-dot {
  width:12px;height:12px; border-radius:50%; flex-shrink:0;
  background:var(--primary); border:2px solid var(--bg-card);
  position:relative; z-index:1; margin-top:4px;
}
.tl-dot.active { background:var(--success); box-shadow: 0 0 8px rgba(76,175,80,.4); }
.tl-dot.upcoming { background:var(--warning); }
.tl-content { flex:1; }
.tl-content .tl-name { font-size:14px; font-weight:500; }
.tl-content .tl-desc { font-size:12px; color:var(--text-muted); margin-top:2px; }

/* 响应式 */
.col-span-2 { grid-column: span 2; }
.col-span-3 { grid-column: span 3; }
.col-span-4 { grid-column: span 4; }

@media (max-width: 1024px) {
  .dashboard { grid-template-columns: repeat(2, 1fr); }
  .col-span-2, .col-span-3, .col-span-4 { grid-column: span 2; }
}
@media (max-width: 640px) {
  .dashboard { grid-template-columns: 1fr; padding:12px; }
  .col-span-2, .col-span-3, .col-span-4 { grid-column: span 1; }
  .topbar { padding:10px 16px; }
  .topbar-left h1 { font-size:16px; }
}
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="topbar">
  <div class="topbar-left">
    <h1>🏔️ 灵山胜境</h1>
    <span class="badge">数据大屏</span>
  </div>
  <div class="topbar-right">
    <span class="live-dot"></span>
    <span class="live-text">实时监控中</span>
    <a href="/" class="btn-back">← 返回导览</a>
  </div>
</nav>

<!-- 仪表盘网格 -->
<div class="dashboard">

  <!-- 统计卡片第1行：4列 -->
  <div class="card stat-card">
    <div class="card-header"><h3>👥 今日游客</h3><span class="icon">📊</span></div>
    <div class="stat-value" id="visitors">--</div>
    <div class="stat-label">截至当前</div>
    <div class="stat-change up" id="visitorsChange">--</div>
  </div>
  <div class="card stat-card">
    <div class="card-header"><h3>💬 AI 对话</h3><span class="icon">🤖</span></div>
    <div class="stat-value" id="chats">--</div>
    <div class="stat-label">今日累计</div>
    <div class="stat-change up" id="chatsChange">--</div>
  </div>
  <div class="card stat-card">
    <div class="card-header"><h3>⭐ 满意度</h3><span class="icon">😊</span></div>
    <div class="stat-value" id="satisfaction">--</div>
    <div class="stat-label">总体好评率</div>
    <div class="stat-change up">持续稳定</div>
  </div>
  <div class="card stat-card">
    <div class="card-header"><h3>🕐 平均响应</h3><span class="icon">⚡</span></div>
    <div class="stat-value" id="response">--</div>
    <div class="stat-label">AI 回复速度</div>
    <div class="stat-change up">低于 1.5s</div>
  </div>

  <!-- 热门景点排行 -->
  <div class="card col-span-2">
    <div class="card-header"><h3>🏆 热门景点 TOP 5</h3><span class="icon">📈</span></div>
    <div class="rank-list" id="spotRank"></div>
  </div>

  <!-- 游客趋势图 -->
  <div class="card col-span-2">
    <div class="card-header"><h3>📅 近7天游客趋势</h3><span class="icon">📉</span></div>
    <div class="chart-area" id="visitorChart"></div>
  </div>

  <!-- AI 对话统计 -->
  <div class="card col-span-2">
    <div class="card-header"><h3>💭 AI 对话情绪分布</h3><span class="icon">🎭</span></div>
    <div id="emotionDist"></div>
  </div>

  <!-- 今日活动 -->
  <div class="card col-span-2">
    <div class="card-header"><h3>🎪 今日活动日程</h3><span class="icon">🕐</span></div>
    <div class="timeline" id="activityTimeline"></div>
  </div>

  <!-- 最近对话 -->
  <div class="card col-span-4">
    <div class="card-header"><h3>📝 最近 AI 对话记录</h3><span class="icon">💬</span></div>
    <div class="conv-list" id="recentConvs"></div>
  </div>

</div>

<script>
(function(){
  'use strict';

  // ── Mock 数据 ──────────────────────────────────────────
  var MOCK_STATS = {
    visitors: 3856,
    visitorsChange: '+12.5%',
    chats: 1247,
    chatsChange: '+8.3%',
    satisfaction: '96.8%',
    response: '0.8s'
  };

  var MOCK_SPOT_RANK = [
    { name:'灵山大佛', visitors:1256, rating:'4.9', rank:1 },
    { name:'九龙灌浴', visitors:982, rating:'4.8', rank:2 },
    { name:'灵山梵宫', visitors:847, rating:'4.9', rank:3 },
    { name:'五印坛城', visitors:534, rating:'4.7', rank:4 },
    { name:'降魔成道', visitors:237, rating:'4.6', rank:5 }
  ];

  var MOCK_VISITOR_TREND = [
    { day:'6/13', val:2850 }, { day:'6/14', val:3200 },
    { day:'6/15', val:4100 }, { day:'6/16', val:3650 },
    { day:'6/17', val:2980 }, { day:'6/18', val:3420 },
    { day:'今天', val:3856 }
  ];

  var MOCK_EMOTIONS = [
    { label:'开心 happy', count:623, pct:50, color:'#4CAF50' },
    { label:'中性 neutral', count:348, pct:28, color:'#9E9E9E' },
    { label:'惊喜 surprise', count:187, pct:15, color:'#FF9800' },
    { label:'悲伤 sad', count:89, pct:7, color:'#E85D5D' }
  ];

  var MOCK_ACTIVITIES = [
    { name:'九龙灌浴表演', time:'10:00', desc:'大型动态音乐群雕表演', status:'completed' },
    { name:'梵宫祈福法会', time:'14:00', desc:'灵山梵宫主殿', status:'active' },
    { name:'夜游灵山', time:'18:00', desc:'全景区灯光秀', status:'upcoming' }
  ];

  var MOCK_CONVS = [
    { text:'灵山大佛怎么走？', emotion:'neutral', time:'16:42' },
    { text:'推荐游览路线', emotion:'happy', time:'16:38' },
    { text:'九龙灌浴几点开始？', emotion:'happy', time:'16:35' },
    { text:'门票多少钱？', emotion:'neutral', time:'16:30' },
    { text:'梵宫值得去吗？', emotion:'surprise', time:'16:25' },
    { text:'景区有吃饭的地方吗', emotion:'happy', time:'16:20' }
  ];

  // ── 尝试从后端获取数据 ───────────────────────────────
  function tryFetch(url, fallback) {
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(d) { return (d && d.data) ? d.data : fallback; })
    .catch(function() { return fallback; });
  }

  // ── 渲染统计卡片 ─────────────────────────────────────
  function renderStatCards() {
    document.getElementById('visitors').textContent = MOCK_STATS.visitors.toLocaleString();
    document.getElementById('visitorsChange').innerHTML = '&#9650; ' + MOCK_STATS.visitorsChange;
    document.getElementById('chats').textContent = MOCK_STATS.chats.toLocaleString();
    document.getElementById('chatsChange').innerHTML = '&#9650; ' + MOCK_STATS.chatsChange;
    document.getElementById('satisfaction').textContent = MOCK_STATS.satisfaction;
    document.getElementById('response').textContent = MOCK_STATS.response;
  }

  // ── 渲染热门排行 ─────────────────────────────────────
  function renderSpotRank() {
    var el = document.getElementById('spotRank');
    var maxV = MOCK_SPOT_RANK[0].visitors;
    el.innerHTML = MOCK_SPOT_RANK.map(function(s) {
      var cls = s.rank <= 3 ? 'top' + s.rank : 'normal';
      var pct = Math.round(s.visitors / maxV * 100);
      return '<div class="rank-item">' +
        '<div class="rank-num ' + cls + '">' + s.rank + '</div>' +
        '<div class="rank-info">' +
          '<div class="name">' + s.name + ' <span style="color:#FFD700;font-size:11px;">&#11088; ' + s.rating + '</span></div>' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="sub">今日 ' + s.visitors.toLocaleString() + ' 人次</div>' +
        '</div>' +
        '<div class="rank-value">' + s.visitors.toLocaleString() + '</div>' +
      '</div>';
    }).join('');
  }

  // ── 渲染游客趋势图 ───────────────────────────────────
  function renderVisitorChart() {
    var el = document.getElementById('visitorChart');
    var maxV = Math.max.apply(null, MOCK_VISITOR_TREND.map(function(d){return d.val;}));
    el.innerHTML = MOCK_VISITOR_TREND.map(function(d) {
      var h = Math.round(d.val / maxV * 160);
      return '<div style="display:flex;flex-direction:column;align-items:center;flex:1;">' +
        '<span style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">' + (d.val/1000).toFixed(1) + 'k</span>' +
        '<div class="chart-bar" style="height:' + h + 'px;' + (d.day==='今天'?'background:linear-gradient(180deg,#6BB5D0,#E85D5D);':'') + '"></div>' +
        '<span class="bar-label">' + d.day + '</span>' +
      '</div>';
    }).join('');
  }

  // ── 渲染情绪分布 ─────────────────────────────────────
  function renderEmotionDist() {
    var el = document.getElementById('emotionDist');
    el.innerHTML = MOCK_EMOTIONS.map(function(e) {
      return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
        '<span style="font-size:13px;font-weight:500;width:90px;text-align:right;">' + e.label + '</span>' +
        '<div class="progress-bar" style="flex:1;height:14px;border-radius:7px;">' +
          '<div class="progress-fill" style="width:' + e.pct + '%;background:' + e.color + ';"></div>' +
        '</div>' +
        '<span style="font-size:13px;font-weight:600;color:var(--text-secondary);width:55px;">' + e.count + '</span>' +
        '<span style="font-size:11px;color:var(--text-muted);width:35px;">' + e.pct + '%</span>' +
      '</div>';
    }).join('');
  }

  // ── 渲染活动时间线 ───────────────────────────────────
  function renderActivityTimeline() {
    var el = document.getElementById('activityTimeline');
    el.innerHTML = MOCK_ACTIVITIES.map(function(a) {
      var cls = a.status === 'active' ? 'active' : (a.status === 'upcoming' ? 'upcoming' : '');
      var badge = a.status === 'active' ? '<span style="font-size:11px;color:var(--success);margin-left:6px;">● 进行中</span>' :
                  (a.status === 'upcoming' ? '<span style="font-size:11px;color:var(--warning);margin-left:6px;">○ 即将开始</span>' :
                  '<span style="font-size:11px;color:var(--text-muted);margin-left:6px;">✓ 已结束</span>');
      return '<div class="tl-item">' +
        '<div class="tl-dot ' + cls + '"></div>' +
        '<div class="tl-content">' +
          '<div class="tl-name">' + a.name + badge + '</div>' +
          '<div class="tl-desc">⏰ ' + a.time + ' · ' + a.desc + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── 渲染最近对话 ─────────────────────────────────────
  function renderRecentConvs() {
    var el = document.getElementById('recentConvs');
    el.innerHTML = MOCK_CONVS.map(function(c) {
      return '<div class="conv-item">' +
        '<span class="tag ' + c.emotion + '">' + c.emotion + '</span>' +
        '<span class="conv-text">' + c.text + '</span>' +
        '<span class="conv-time">' + c.time + '</span>' +
      '</div>';
    }).join('');
  }

  // ── 初始化 ───────────────────────────────────────────
  function init() {
    renderStatCards();
    renderSpotRank();
    renderVisitorChart();
    renderEmotionDist();
    renderActivityTimeline();
    renderRecentConvs();

    // 尝试从后端拉取真实数据
    tryFetch('/api/v1/scenic/stats').then(function(data) {
      if (data && data.visitors) MOCK_STATS.visitors = data.visitors;
      if (data && data.chats) MOCK_STATS.chats = data.chats;
      renderStatCards();
    });
    tryFetch('/api/v1/scenic/spots').then(function(spots) {
      if (spots && spots.length) {
        MOCK_SPOT_RANK = spots.slice(0,5).map(function(s,i) { return { name:s.name, visitors:Math.floor(Math.random()*800+200), rating:s.rating||'4.5', rank:i+1 }; });
        renderSpotRank();
      }
    });
    tryFetch('/api/v1/scenic/activities').then(function(acts) {
      if (acts && acts.length) {
        MOCK_ACTIVITIES = acts.slice(0,3).map(function(a) { return { name:a.name, time:a.time||'10:00', desc:a.location||'', status:a.status||'active' }; });
        renderActivityTimeline();
      }
    });
  }

  // ── 自动刷新 ─────────────────────────────────────────
  setInterval(function() {
    MOCK_STATS.visitors += Math.floor(Math.random() * 20);
    MOCK_STATS.chats += Math.floor(Math.random() * 5);
    renderStatCards();
  }, 5000);

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
