<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>灵山胜境 · AI 数字人导游</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js",
    "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js"
  }
}
</script>

<style>
:root {
  --font-sans: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --font-serif: "Noto Serif SC","Source Han Serif SC","SimSun",serif;
  --primary: #2B5F75; --primary-light: #4A8FA8; --primary-dark: #1A3A4A;
  --accent: #C73E3A; --accent-light: #E85D5D;
  --bg-primary: #F5F0E8; --bg-secondary: #FFFFFF;
  --text-primary: #1A1A1A; --text-secondary: #666; --text-muted: #999;
  --success: #4CAF50; --warning: #FF9800;
  --glass-bg: rgba(255,255,255,0.85);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.1);
  --spacing-xs: 4px; --spacing-sm: 8px; --spacing-md: 12px; --spacing-lg: 16px;
  --min-touch: 44px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px; }
.phone-frame { width:390px; height:844px; background:var(--bg-primary); border-radius:44px; overflow:hidden; position:relative; box-shadow:0 0 0 8px #1a1a1a,0 0 0 10px #333,0 20px 60px rgba(0,0,0,0.5); }
@media(max-width:430px){ body{padding:0} .phone-frame{width:100%;height:100dvh;border-radius:0;box-shadow:none} }

/* 管理入口按钮 — 全局浮动操作栏 */
body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.phone-frame { box-shadow: 0 0 0 8px #1a1a1a, 0 0 0 10px #333, 0 20px 60px rgba(0,0,0,0.5); }

.admin-entry {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  gap: 12px;
  padding: 10px 16px;
  border-radius: 40px;
  background: rgba(30,41,59,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(74,143,168,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,143,168,0.1);
  transition: all 0.3s ease;
}
.admin-entry:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,143,168,0.25);
  transform: translateX(-50%) translateY(-2px);
}
.admin-entry a {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  border-radius: 30px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  text-decoration: none;
  transition: all 0.25s;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.admin-entry a:hover {
  background: rgba(74,143,168,0.25);
  color: #fff;
  transform: scale(1.04);
}
.admin-entry a.active-link {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(43,95,117,0.4);
}
.admin-entry a svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

.admin-entry .divider {
  width: 1px;
  background: rgba(255,255,255,0.15);
  align-self: stretch;
  margin: 2px 0;
}

/* 移动端：浮动条始终可见 */
@media (max-width: 430px) {
  .admin-entry {
    bottom: 16px;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 32px;
  }
  .admin-entry a {
    padding: 8px 14px;
    font-size: 12px;
    gap: 5px;
  }
  .admin-entry a svg { width: 14px; height: 14px; }
  .admin-entry .divider { display: none; }
  .admin-entry a span.label-text { display: none; }
  .admin-entry a { border-radius: 50%; width: 40px; height: 40px; padding: 0; justify-content: center; }
  .admin-entry a svg { width: 18px; height: 18px; }
  /* 移动端小屏时按钮缩小为仅图标 */
}

.status-bar { height:54px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 8px; font-size:14px; font-weight:600; position:absolute; top:0;left:0;right:0; z-index:100; color:#fff; }
.page { position:absolute; top:0;left:0;right:0;bottom:0; overflow-y:auto; overflow-x:hidden; transition:transform .4s cubic-bezier(.25,.46,.45,.94),opacity .4s; -webkit-overflow-scrolling:touch; scrollbar-width:none; -ms-overflow-style:none; }
.page::-webkit-scrollbar { display:none; }
.page.hidden { transform:translateX(100%); opacity:0; pointer-events:none; }
.page.hidden-left { transform:translateX(-100%); opacity:0; pointer-events:none; }

.home-header { background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light)); padding:60px 20px var(--spacing-lg); position:relative; overflow:hidden; }
.home-header::before { content:''; position:absolute; top:-50px;right:-50px; width:200px;height:200px; background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%); border-radius:50%; }
.home-header::after { content:''; position:absolute; bottom:-30px;left:-30px; width:150px;height:150px; background:radial-gradient(circle,rgba(199,62,58,.15) 0%,transparent 70%); border-radius:50%; }
.search-bar { display:flex; align-items:center; background:rgba(255,255,255,.15); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.2); border-radius:24px; padding:10px 16px; gap:var(--spacing-sm); position:relative; z-index:1; }
.search-bar input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:14px; font-family:inherit; min-height:var(--min-touch); }
.search-bar input::placeholder { color:rgba(255,255,255,.6); }
.search-bar svg { width:18px;height:18px; fill:rgba(255,255,255,.7); cursor:pointer; flex-shrink:0; }

.ai-section { display:flex; align-items:center; gap:var(--spacing-md); padding:var(--spacing-lg) 20px var(--spacing-md); position:relative; }
.ai-avatar-ring { width:80px;height:80px; border-radius:50%; background:rgba(255,255,255,.15); padding:0; position:relative; flex-shrink:0; overflow:hidden; }
.ai-avatar-inner { width:100%;height:100%; border-radius:50%; overflow:hidden; position:relative; }
.ai-avatar-inner canvas { width:100%;height:100%; display:block; }
.ai-info { flex:1; }
.ai-status { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--primary); font-weight:500; }
.ai-status .dot { width:8px;height:8px; background:var(--success); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.ai-greeting { margin-top:var(--spacing-xs); font-size:14px; color:var(--text-secondary); }
.ai-chat-btn { display:inline-flex; align-items:center; gap:4px; margin-top:var(--spacing-sm); padding:6px 14px; background:var(--primary); color:#fff; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; min-height:var(--min-touch); min-width:var(--min-touch); }
.ai-chat-btn:active { transform:scale(.95); background:var(--primary-dark); }

.quick-actions { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--spacing-md); padding:0 20px var(--spacing-lg); }
.quick-action { display:flex; align-items:center; gap:var(--spacing-md); padding:14px var(--spacing-md); background:var(--bg-secondary); border-radius:14px; cursor:pointer; transition:transform .2s; box-shadow:0 2px 8px rgba(0,0,0,.04); min-height:var(--min-touch); }
.quick-action:active { transform:scale(.97); }
.quick-action-icon { width:44px;height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.quick-action-icon.q1 { background:linear-gradient(135deg,#E8F4F8,#B8D8E8); }
.quick-action-icon.q2 { background:linear-gradient(135deg,#FDE8E8,#F0C0C0); }
.quick-action-icon.q3 { background:linear-gradient(135deg,#E8F0E8,#C0D8C0); }
.quick-action-icon.q4 { background:linear-gradient(135deg,#F0E8F0,#D8C0D8); }
.quick-action-text { display:flex; flex-direction:column; gap:2px; }
.quick-action-text .label { font-size:14px; font-weight:600; color:var(--text-primary); }
.quick-action-text .desc { font-size:12px; color:var(--text-muted); }

.section-title { display:flex; align-items:center; justify-content:space-between; padding:0 20px; margin-bottom:var(--spacing-md); }
.section-title h3 { font-size:17px; font-weight:700; color:var(--text-primary); font-family:var(--font-serif); }
.section-title a { font-size:13px; color:var(--primary); text-decoration:none; min-height:var(--min-touch); display:flex; align-items:center; }

.spot-scroll { display:flex; gap:var(--spacing-md); padding:0 20px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
.spot-scroll::-webkit-scrollbar { display:none; }
.spot-card { min-width:160px; max-width:160px; border-radius:12px; overflow:hidden; background:var(--bg-secondary); box-shadow:0 2px 12px rgba(0,0,0,.06); scroll-snap-align:start; cursor:pointer; transition:transform .2s; }
.spot-card:active { transform:scale(.97); }
.spot-card-img { width:100%; height:90px; object-fit:cover; display:block; }
.spot-card-info { padding:var(--spacing-sm) var(--spacing-md); }
.spot-card-info h4 { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.spot-card-info .meta { display:flex; align-items:center; gap:var(--spacing-sm); font-size:12px; color:var(--text-muted); }
.spot-card-info .meta .rating { color:var(--warning); font-weight:600; }
.spot-card-info .meta .tag { padding:1px 6px; background:rgba(43,95,117,.06); color:var(--primary); border-radius:4px; font-size:11px; }

.route-scroll { display:flex; gap:var(--spacing-md); padding:0 20px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
.route-scroll::-webkit-scrollbar { display:none; }
.route-card { min-width:220px; border-radius:12px; overflow:hidden; background:var(--bg-secondary); box-shadow:0 2px 12px rgba(0,0,0,.06); scroll-snap-align:start; cursor:pointer; transition:transform .2s; padding:var(--spacing-md); border-left:3px solid var(--primary); }
.route-card:active { transform:scale(.97); }
.route-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--spacing-sm); }
.route-card-header .name { font-size:14px; font-weight:700; color:var(--text-primary); }
.route-card-header .duration { font-size:11px; color:var(--text-muted); background:var(--bg-primary); padding:2px 8px; border-radius:10px; }
.route-card .spots-preview { font-size:12px; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

.activity-list { padding:0 20px; }
.activity-item { display:flex; gap:var(--spacing-md); padding:var(--spacing-md) 0; border-bottom:1px solid rgba(0,0,0,.06); cursor:pointer; min-height:var(--min-touch); align-items:center; }
.activity-item:last-child { border-bottom:none; }
.activity-thumb { width:80px; height:60px; border-radius:10px; object-fit:cover; flex-shrink:0; }
.activity-info h4 { font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:4px; }
.activity-info p { font-size:12px; color:var(--text-muted); }
.activity-tag { display:inline-block; padding:2px 8px; background:rgba(199,62,58,.08); color:var(--accent); font-size:11px; border-radius:4px; margin-top:4px; }

.bottom-nav { position:absolute; bottom:0;left:0;right:0; height:calc(84px + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:var(--glass-bg); backdrop-filter:blur(20px); border-top:1px solid rgba(0,0,0,.06); display:flex; align-items:flex-start; justify-content:space-around; padding-top:8px; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; transition:all .2s; padding:4px 16px; min-width:48px; min-height:48px; justify-content:center; }
.nav-item.active svg { fill:var(--accent); }
.nav-item.active span { color:var(--accent); font-weight:600; }
.nav-item svg { width:24px;height:24px; fill:var(--text-muted); transition:fill .2s; }
.nav-item svg.nav-icon-outlined { display:block; }
.nav-item svg.nav-icon-filled { display:none; }
.nav-item.active svg.nav-icon-outlined { display:none; }
.nav-item.active svg.nav-icon-filled { display:block; }
.nav-item span { font-size:11px; color:var(--text-muted); transition:color .2s; }
.page-content { padding-bottom:100px; }
.pull-refresh-hint { text-align:center; padding:8px 0 4px; font-size:12px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:4px; opacity:0; transition:opacity .3s; }
.pull-refresh-hint.visible { opacity:1; }
.pull-refresh-hint .arrow { display:inline-block; transition:transform .3s; font-size:14px; }
.pull-refresh-hint .arrow.pulled { transform:rotate(180deg); }

.chat-header { background:linear-gradient(135deg,var(--primary-dark),var(--primary)); padding:54px 16px 14px; display:flex; align-items:center; gap:var(--spacing-md); color:#fff; box-shadow:0 2px 12px rgba(0,0,0,.1); }
.chat-header .back-btn { width:var(--min-touch);height:var(--min-touch); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; transition:all .2s; }
.chat-header .back-btn:hover { background:rgba(255,255,255,.15); transform:scale(1.05); }
.chat-header .back-btn svg { width:20px;height:20px; fill:#fff; }
.chat-header h2 { font-size:17px; font-weight:600; flex:1; letter-spacing:.02em; }
.chat-header .clear-btn { font-size:13px; color:rgba(255,255,255,.85); cursor:pointer; padding:6px 12px; border-radius:14px; transition:all .2s; min-height:var(--min-touch); display:flex; align-items:center; border:none; background:rgba(255,255,255,.1); font-family:inherit; }
.chat-header .clear-btn:hover { background:rgba(255,255,255,.2); }
.chat-avatar-area { background:linear-gradient(180deg,var(--primary) 0%,#3a7ca5 40%,var(--bg-primary) 100%); padding:12px 20px 10px; display:flex; flex-direction:column; align-items:center; }
.chat-3d-avatar { width:180px; height:200px; border-radius:24px; background:linear-gradient(180deg,rgba(255,255,255,.15),rgba(255,255,255,.08)); border:2px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; transition:all .4s ease; box-shadow:0 8px 32px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.2); }
.chat-3d-avatar canvas { width:100%!important; height:100%!important; display:block; }
.chat-3d-avatar .avatar-placeholder { width:36px; height:36px; border-radius:50%; position:absolute; bottom:8px; left:8px; animation:float 3s ease-in-out infinite; overflow:hidden; display:none; z-index:2; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.chat-3d-avatar .avatar-placeholder.show { display:block; }
.chat-3d-avatar .avatar-placeholder .fallback-inner { width:100%;height:100%; background:linear-gradient(135deg,#E8D5B7,#D4B896); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.chat-3d-avatar .speaking-label { position:absolute; top:16px;right:16px; background:var(--accent); color:#fff; font-size:11px; padding:3px 10px; border-radius:12px; animation:pulse 1.5s infinite; display:none; z-index:2; }
.chat-3d-avatar .speaking-label.show { display:block; }

.chat-messages { padding:var(--spacing-lg) 16px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; flex:1; scrollbar-width:none; -ms-overflow-style:none; }
.chat-messages::-webkit-scrollbar { display:none; }
.chat-msg { display:flex; gap:10px; max-width:88%; animation:msgIn .3s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.chat-msg.ai { align-self:flex-start; }
.chat-msg.user { align-self:flex-end; flex-direction:row-reverse; }
.chat-msg-avatar { width:32px;height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; background:linear-gradient(135deg,#3a7ca5,#5ba4cf); box-shadow:0 2px 8px rgba(58,124,165,.25); margin-top:2px; }
.chat-msg.user .chat-msg-avatar { background:linear-gradient(135deg,#e85d5d,#f08080); box-shadow:0 2px 8px rgba(232,93,93,.25); }
.chat-bubble { padding:12px 16px; border-radius:18px; font-size:14.5px; line-height:1.65; white-space:pre-line; letter-spacing:.01em; }
.chat-msg.ai .chat-bubble { background:linear-gradient(135deg,#ffffff,#fafafa); color:var(--text-primary); border-bottom-left-radius:6px; box-shadow:0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.03); }
.chat-msg.user .chat-bubble { background:linear-gradient(135deg,#2B5F75,#3a7ca5); color:#fff; border-bottom-right-radius:6px; box-shadow:0 2px 12px rgba(43,95,117,.2); }
.chat-timestamp { text-align:center; font-size:11px; color:var(--text-muted); padding:4px 0; align-self:center; }

.typing-indicator { display:flex; gap:10px; max-width:88%; align-self:flex-start; animation:msgIn .3s ease-out; }
.typing-content { display:flex; flex-direction:column; gap:4px; }
.typing-label { font-size:11px; color:var(--text-muted); margin-left:4px; }
.typing-dots { display:flex; align-items:center; gap:5px; padding:12px 16px; background:linear-gradient(135deg,#ffffff,#fafafa); border-radius:18px; border-bottom-left-radius:6px; box-shadow:0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.03); }
.typing-dots span { width:7px;height:7px; background:var(--primary-light); border-radius:50%; animation:typingBounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

.quick-questions { display:flex; flex-wrap:wrap; gap:10px; padding:10px 16px 14px; position:absolute; bottom:148px; left:0; right:0; z-index:10; }
.quick-q-btn { padding:8px 16px; border-radius:20px; border:1.5px solid rgba(43,95,117,.3); background:rgba(255,255,255,.9); backdrop-filter:blur(8px); color:var(--primary); font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; transition:all .2s ease; white-space:nowrap; min-height:36px; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.04); }
.quick-q-btn:hover { background:rgba(43,95,117,.08); border-color:var(--primary); transform:translateY(-1px); box-shadow:0 4px 12px rgba(43,95,117,.12); }
.quick-q-btn:active { background:var(--primary); color:#fff; transform:scale(.95); border-color:var(--primary); }

.chat-input-area { position:absolute; bottom:calc(84px + env(safe-area-inset-bottom,0px)); left:0;right:0; background:rgba(255,255,255,.92); backdrop-filter:blur(20px); border-top:1px solid rgba(0,0,0,.05); padding:10px 14px calc(12px + env(safe-area-inset-bottom,0px)); display:flex; align-items:flex-end; gap:10px; z-index:50; }
.chat-input-area .voice-btn { width:var(--min-touch);height:var(--min-touch); border-radius:50%; background:linear-gradient(135deg,var(--primary),#3a7ca5); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; box-shadow:0 2px 8px rgba(43,95,117,.25); }
.chat-input-area .voice-btn:hover { transform:scale(1.05); box-shadow:0 4px 12px rgba(43,95,117,.3); }
.chat-input-area .voice-btn svg { width:20px;height:20px; fill:#fff; }
.chat-input-area .voice-btn.recording { background:linear-gradient(135deg,var(--accent),#f08080); animation:pulse 1s infinite; }
.chat-input-area textarea { flex:1; min-height:var(--min-touch); max-height:96px; border:1.5px solid rgba(0,0,0,.08); border-radius:22px; padding:11px 18px; font-size:14.5px; font-family:inherit; background:#fff; outline:none; transition:all .2s; resize:none; line-height:1.5; overflow-y:auto; box-shadow:0 1px 4px rgba(0,0,0,.03); }
.chat-input-area textarea:focus { border-color:var(--primary); box-shadow:0 2px 8px rgba(43,95,117,.1); }
.chat-input-area textarea::placeholder { color:var(--text-muted); }
.chat-input-area .send-btn { width:var(--min-touch);height:var(--min-touch); border-radius:50%; background:linear-gradient(135deg,var(--accent),#f08080); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; box-shadow:0 2px 8px rgba(199,62,58,.25); }
.chat-input-area .send-btn:hover { transform:scale(1.05); box-shadow:0 4px 12px rgba(199,62,58,.3); }
.chat-input-area .send-btn svg { width:18px;height:18px; fill:#fff; }

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';
import { createNoise3D, createNoise4D } from 'simplex-noise';

let currentVrm = null;
let clock = new THREE.Clock();
let audioCtx = null;
let audioAnalyser = null;
let isSpeaking = false;
let idleTime = 0;

// ── Simplex noise generators for organic movement ──
const noise3D = createNoise3D();
const noise4D = createNoise4D();

// ── Spring dynamics for natural head/body movement ──
class Spring {
  constructor(stiffness = 0.08, damping = 0.75) {
    this.value = 0; this.target = 0; this.velocity = 0;
    this.stiffness = stiffness; this.damping = damping;
  }
  update(dt) {
    var force = (this.target - this.value) * this.stiffness;
    this.velocity += force;
    this.velocity *= this.damping;
    this.value += this.velocity * Math.min(dt * 60, 2);
    return this.value;
  }
  set(v) { this.target = v; }
}

// Spring instances for different body parts
const headPitch = new Spring(0.06, 0.92);
const headYaw   = new Spring(0.05, 0.93);
const headRoll  = new Spring(0.04, 0.94);
const bodyLean  = new Spring(0.04, 0.93);
const bodySway  = new Spring(0.03, 0.94);

// ── Speaking blend state (0=idle, 1=speaking, smooth transition) ──
let speakBlend = 0;  // 0..1, blended over ~300ms
let lastRms = 0;     // smoothed audio RMS
let rmsSmooth = 0;   // EMA-smoothed RMS for gesture driving

// ── Emotion state (persists across frames) ──
let activeEmotion = null;
let emotionIntensity = 0;
let emotionDecayRate = 0.15;

// ── Natural blink (random intervals, ~150ms duration) ──
let blinkTimer = 2.0;     // countdown to next blink (seconds)
let blinkPhase = 0;       // 0=idle, >0=blink in progress (0..1..0 curve)
let blinkDuration = 0.15; // blink duration in seconds

// Map LLM emotion names → actual model blendShape names (AliciaSolid VRM 1.0)
// Model has: neutral, aa, ih, ou, ee, oh, blink, happy, angry, sad, relaxed, lookUp, lookDown, lookLeft, lookRight, blinkLeft, blinkRight
const EMOTION_MAP = {
  'happy': 'happy', 'joy': 'happy', 'fun': 'happy',
  'sad': 'sad', 'angry': 'angry',
  'surprise': 'relaxed', 'surprised': 'relaxed',
  'neutral': 'neutral', 'relaxed': 'relaxed'
};

// Camera presets (calibrated for AliciaSolid: height=1.65, center_y=0.82)

// ── Load VRM model ──

  var shapes = [];

// ── Organic idle + speaking animation with noise, springs, audio-energy ──
function applyIdleAnimation(delta) {
  if (!currentVrm) return;
  idleTime += delta;
  var t = idleTime;
  var s = currentVrm.scene;

  // ── Smooth speakBlend transition (0→1 when speaking, 1→0 when silent) ──
  var blendSpeed = 3.5; // ~300ms to full blend
  if (isSpeaking) { speakBlend = Math.min(1, speakBlend + delta * blendSpeed); }
  else { speakBlend = Math.max(0, speakBlend - delta * blendSpeed); }

  // ── Audio RMS with EMA smoothing ──
  var rawRms = 0;
  if (isSpeaking && audioAnalyser) {
    var data = new Uint8Array(audioAnalyser.frequencyBinCount);
    audioAnalyser.getByteTimeDomainData(data);
    var sum = 0;
    for (var i = 0; i < data.length; i++) { var v = (data[i] - 128) / 128; sum += v * v; }
    rawRms = Math.sqrt(sum / data.length);
  }
  // EMA smoothing: rmsSmooth follows rawRms with smoothing factor
  rmsSmooth += (rawRms - rmsSmooth) * 0.3;
  var energy = Math.min(rmsSmooth * 4, 1.0); // normalized 0..1

  // ── Arm pose: interpolate between idle rest and speaking gesture ──
  var hum = currentVrm.humanoid;
  if (hum) {
    var lua = hum.getNormalizedBoneNode('leftUpperArm');
    var rua = hum.getNormalizedBoneNode('rightUpperArm');
    var lla = hum.getNormalizedBoneNode('leftLowerArm');
    var rla = hum.getNormalizedBoneNode('rightLowerArm');
    var ls  = hum.getNormalizedBoneNode('leftShoulder');
    var rs  = hum.getNormalizedBoneNode('rightShoulder');

    // Noise-driven micro variation (very subtle during idle)
    var nArm1 = noise3D(t * 0.3, 0, 0) * 0.015;
    var nArm2 = noise3D(0, t * 0.25, 1) * 0.015;

    // Idle arm targets
    var luaZ_idle = 1.15, luaX_idle = 0.05;
    var ruaZ_idle = -1.15, ruaX_idle = 0.05;
    var llaX_idle = 0.25, llaZ_idle = -0.08;
    var rlaX_idle = 0.25, rlaZ_idle = 0.08;

    // Speaking arm targets (driven by audio energy)
    var e = energy * speakBlend;
    var ruaZ_spk = -1.15 + noise3D(t * 2.0, 2, 0) * 0.2 * e;
    var ruaX_spk = 0.12 + e * 0.3 + noise3D(t * 2.5, 3, 0) * 0.1 * e;
    var ruaY_spk = noise3D(t * 1.8, 4, 0) * 0.1 * e;
    var rlaX_spk = 0.35 + noise3D(t * 2.8, 5, 0) * 0.3 * e;
    var luaZ_spk = 1.15 + noise3D(t * 1.5, 6, 0) * 0.06 * e;
    var luaX_spk = 0.08 + e * 0.08;
    var llaX_spk = 0.28 + noise3D(t * 1.6, 7, 0) * 0.08 * e;

    // Arm pose: blend idle ↔ speaking based on audio energy
    var sb = speakBlend;  // 0=idle, 1=full speaking
    if (lua) {
      lua.rotation.z = luaZ_idle * (1 - sb) + luaZ_spk * sb;
      lua.rotation.x = luaX_idle * (1 - sb) + luaX_spk * sb;
    }
    if (rua) {
      rua.rotation.z = ruaZ_idle * (1 - sb) + ruaZ_spk * sb;
      rua.rotation.x = ruaX_idle * (1 - sb) + ruaX_spk * sb;
      rua.rotation.y = ruaY_spk * sb;
    }
    if (lla) {
      lla.rotation.x = llaX_idle * (1 - sb) + llaX_spk * sb;
      lla.rotation.z = llaZ_idle;
    }
    if (rla) {
      rla.rotation.x = rlaX_idle * (1 - sb) + rlaX_spk * sb;
      rla.rotation.z = rlaZ_idle;
    }

    // Shoulders: completely fixed
    if (ls) { ls.rotation.z = 0.08; ls.rotation.x = 0; }
    if (rs) { rs.rotation.z = -0.08; rs.rotation.x = 0; }
  }

  // ── Body position: gentle breathing + micro-activity ──
  var breathPhase = Math.sin(t * 0.7) * 0.015;
  s.position.x = Math.sin(t * 0.35) * 0.01;
  s.position.y = breathPhase;

  // ── Torso: facing camera with slight natural sway ──
  s.rotation.y = Math.PI + Math.sin(t * 0.4) * 0.02;
  s.rotation.z = Math.sin(t * 0.3) * 0.015;

  // ── Head: spring dynamics with natural micro-movements ──
  // Idle: slow organic drift using noise
  var headPitchIdle = noise3D(t * 0.3, 17, 0) * 0.025 + noise3D(t * 0.7, 18, 0) * 0.01;
  var headYawIdle   = noise3D(t * 0.25, 19, 0) * 0.02;
  var headRollIdle  = noise3D(t * 0.2, 20, 0) * 0.012;

  // Blend idle ↔ speaking (speakBlend is set earlier based on audio energy)
  headPitch.set(headPitchIdle);
  headYaw.set(headYawIdle);
  headRoll.set(headRollIdle);

  // Update springs (natural overshoot & settle)
  s.rotation.x = headPitch.update(delta);
  s.rotation.y += headYaw.update(delta);
  s.rotation.z += headRoll.update(delta);

  // ── BlendShapes: micro-expressions (skip if active emotion) ──
  if (window._setBlendShape) {
    if (!activeEmotion || emotionIntensity < 0.1) {
      // 重置所有可能被设置的表情
      ['happy', 'sad', 'angry', 'relaxed', 'surprised'].forEach(function(e) {
        window._setBlendShape(e, 0);
      });
    }
  }
}

// ── Animation loop: render to active page canvas ──
function animate() {
  requestAnimationFrame(animate);
  var delta = clock.getDelta();
  if (delta > 0.1) delta = 0.016;

  var homePage = document.getElementById('pageHome');
  var chatPage = document.getElementById('pageChat');
  var isHome = homePage && !homePage.classList.contains('hidden');
  var isChat = chatPage && !chatPage.classList.contains('hidden');

  if (!isHome && !isChat) return;

  // Smooth camera interpolation (chat)
  camCurrent.pos.lerp(camTarget.pos, 0.08);
  camCurrent.look.lerp(camTarget.look, 0.08);
  chatCamera.position.copy(camCurrent.pos);
  chatCamera.lookAt(camCurrent.look);

  // ── LookAt: update target with noise drift for natural gaze ──
  if (currentVrm && currentVrm.lookAt && window._vrmLookAt) {
    var t = clock.elapsedTime;
    var activeCam = isHome ? homeCamera : chatCamera;
    var camPos = new THREE.Vector3();
    activeCam.getWorldPosition(camPos);
    currentVrm.lookAt.setTarget(camPos);
  }

  // VRM internal update (blend shapes, spring bones, lookAt)
  if (currentVrm) currentVrm.update(delta);

  // Idle animation: applied AFTER update so bone rotations persist to render
  applyIdleAnimation(delta);

  // ── Apply active emotion (must be after update, re-applied each frame) ──
  if (activeEmotion && window._setBlendShape && emotionIntensity > 0.01) {
    window._setBlendShape(activeEmotion, emotionIntensity);
    emotionIntensity = Math.max(0, emotionIntensity - emotionDecayRate * delta);
  } else if (emotionIntensity <= 0.01 && activeEmotion) {
    // 重置旧情绪表情为0（VRM 1.0 的中性状态就是所有表情归零）
    if (window._setBlendShape) window._setBlendShape(activeEmotion, 0);
    activeEmotion = null;
    emotionIntensity = 0;
  }

  // ── Natural blink: random intervals + smooth open/close ──
  if (window._setBlendShape) {
    blinkTimer -= delta;
    if (blinkTimer <= 0 && blinkPhase <= 0) {
      // Start a new blink
      blinkPhase = blinkDuration;
      // Next blink in 2-6 seconds (random)
      blinkTimer = 2.0 + noise3D(clock.elapsedTime * 0.1, 40, 0) * 2.0 + 2.0;
    }
    if (blinkPhase > 0) {
      // Smooth bell curve: 0→1→0 over blinkDuration
      var progress = 1.0 - (blinkPhase / blinkDuration);
      var blinkVal = Math.sin(progress * Math.PI); // peaks at midpoint
      window._setBlendShape('blink', blinkVal);
      blinkPhase = Math.max(0, blinkPhase - delta);
    }
  }

  // ── Lip sync: audio RMS → mouth open blendShape ──
  if (isSpeaking && audioAnalyser && window._setBlendShape) {
    const data = new Uint8Array(audioAnalyser.frequencyBinCount);
    audioAnalyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) { var v = (data[i] - 128) / 128; sum += v * v; }
    const rms = Math.sqrt(sum / data.length);
    var mouthOpen = Math.min(rms * 4, 1.0) * 0.85;
    window._setBlendShape('aa', mouthOpen);
  }

  // Render to active canvas
  if (isHome) {
    homeRenderer.render(scene, homeCamera);
  }
  if (isChat) {
    chatRenderer.render(scene, chatCamera);
  }
}
animate();

// ── Resize handler ──
function updateChatCanvasSize() {
  var s = getChatCanvasSize();
  chatRenderer.setSize(s.w, s.h, false);
  chatCamera.aspect = s.w / s.h;
  chatCamera.updateProjectionMatrix();
}
window.addEventListener('resize', updateChatCanvasSize);

window.setVRMExpression = function(emotionName) {
  if (!window._setBlendShape) { console.log('[VRM] _setBlendShape not ready'); return; }
  var mapped = EMOTION_MAP[emotionName] || EMOTION_MAP[emotionName.toLowerCase()] || emotionName;
  activeEmotion = mapped;
  emotionIntensity = 1.0;
  console.log('[VRM] Expression set:', emotionName, '→', mapped);
};

window._currentAudioSource = null;
window._audioResolve = null;

window.playVRMAudio = async function(audioUrl) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    const resp = await fetch(audioUrl);
    const arrayBuffer = await resp.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    audioAnalyser = audioCtx.createAnalyser();
    audioAnalyser.fftSize = 256;
    source.connect(audioAnalyser);
    audioAnalyser.connect(audioCtx.destination);
    isSpeaking = true;
    window._currentAudioSource = source;
    console.log('[VRM] Audio playing, analyser active');
    var sl = document.getElementById('speakingLabel');
    if (sl) sl.classList.add('show');
    source.start();
    return new Promise(function(resolve) {
      window._audioResolve = resolve;
      source.onended = function() {
        isSpeaking = false;
        audioAnalyser = null;
        window._currentAudioSource = null;
        window._audioResolve = null;
        if (sl) sl.classList.remove('show');
        resolve();
      };
    });
  } catch (err) {
    isSpeaking = false;
    window._currentAudioSource = null;
    window._audioResolve = null;
    var sl = document.getElementById('speakingLabel');
    if (sl) sl.classList.remove('show');
    throw err;
  }
};

window.stopVRMAudio = function() {
  if (window._currentAudioSource) {
    try { window._currentAudioSource.stop(); } catch(e) {}
    window._currentAudioSource = null;
  }
  isSpeaking = false;
  audioAnalyser = null;
  var sl = document.getElementById('speakingLabel');
  if (sl) sl.classList.remove('show');
  if (window._audioResolve) { window._audioResolve(); window._audioResolve = null; }
};
</script>

<!-- App Script -->
<script>
(function() {
  'use strict';
  var messagesEl = document.getElementById('chatMessages');
  var inputEl = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var voiceBtn = document.getElementById('voiceBtn');
  var sDot = document.getElementById('statusDotChat');
  var sText = document.getElementById('statusTextChat');
  var sLabel = document.getElementById('speakingLabel');

  var isRecording = false;
  var isProcessing = false;  // AI is generating a response
  var recognition = null;
  var mediaRecorder = null;
  var audioChunks = [];

  function setSpeaking(s) {
    if (sDot) sDot.style.background = s ? 'var(--accent)' : 'var(--success)';
    if (sText) sText.textContent = s ? '正在播报…' : '在线 · 随时为你服务';
    if (sLabel) sLabel.classList.toggle('show', s);
  }

  function addMessage(text, role, audioUrl) {
    var match = text.match(/\[情绪:\s*(\w+)\]/);
    var emotion = null;
    var displayText = text;
    if (match) { emotion = match[1].toLowerCase(); displayText = text.replace(/\[情绪:\s*\w+\]/, '').trim(); }

    // 统一 AI 消息的 CSS 类名为 'ai'（CSS 定义的是 .chat-msg.ai）
    var cssRole = role === 'bot' ? 'ai' : role;
    var div = document.createElement('div');
    div.className = 'chat-msg ' + cssRole;
    var av = document.createElement('div'); av.className = 'chat-msg-avatar'; av.textContent = role === 'bot' ? '🔊' : '👤';
    var bub = document.createElement('div'); bub.className = 'chat-bubble'; bub.textContent = displayText;
    div.appendChild(av); div.appendChild(bub);
    messagesEl.appendChild(div);
    setTimeout(function() { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);

    if (role === 'bot' && audioUrl) {
      setSpeaking(true);
      // Apply emotion immediately when message arrives (before/during audio)
      if (emotion) setTimeout(function() { if (window.setVRMExpression) window.setVRMExpression(emotion); }, 200);
      if (typeof window.playVRMAudio === 'function') {
        window.playVRMAudio(audioUrl).then(function() {
          setSpeaking(false);
        }).catch(function() {
          var a = new Audio(audioUrl); a.play().catch(function(err){console.warn("Audio play error:",err)});
          a.onended = function() { setSpeaking(false); };
        });
      } else {
        var a = new Audio(audioUrl); a.play().catch(function(err){console.warn("Audio play error:",err)});
        a.onended = function() { setSpeaking(false); };
      }
    } else if (role === 'bot' && emotion) {
      setTimeout(function() { if (window.setVRMExpression) window.setVRMExpression(emotion); }, 300);
    }
  }

  function showTyping(show) {
    var ind = document.getElementById('typingIndicator');
    if (show && !ind) {
      var d = document.createElement('div'); d.className = 'typing-indicator'; d.id = 'typingIndicator';
      d.innerHTML = '<div class="chat-msg-avatar">🔊</div><div class="typing-content"><span class="typing-label">灵灵正在思考...</span><div class="typing-dots"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(d);
      setTimeout(function() { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
    } else if (!show && ind) { ind.remove(); }
  }

  function setSendEnabled(enabled) {
    sendBtn.disabled = !enabled;
    sendBtn.style.opacity = enabled ? '1' : '0.4';
    sendBtn.style.cursor = enabled ? 'pointer' : 'not-allowed';
    inputEl.disabled = !enabled;
    inputEl.style.opacity = enabled ? '1' : '0.6';
    inputEl.placeholder = enabled ? '输入您的问题...' : 'AI 正在回答中…';
    // 同步禁用/启用语音按钮，避免AI处理期间并发录音
    if (voiceBtn) {
      voiceBtn.disabled = !enabled;
      voiceBtn.style.opacity = enabled ? '1' : '0.4';
      voiceBtn.style.pointerEvents = enabled ? 'auto' : 'none';
    }
  }

  window.sendMessage = async function() {
    var text = inputEl.value.trim();
    if (!text || isProcessing) return;

    // Stop current speech if playing
    if (typeof window.stopVRMAudio === 'function') window.stopVRMAudio();
    setSpeaking(false);

    inputEl.value = ''; inputEl.style.height = 'auto';
    addMessage(text, 'user');
    isProcessing = true;
    setSendEnabled(false);
    showTyping(true);
    try {
      var resp = await fetch('/chat/message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: text, session_id: 'default' }) });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      showTyping(false);
      addMessage(data.reply || _getMockReply(), 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      // 回退到 Mock 回复（演示模式）
      addMessage(_getMockReply(), 'bot');
      _showDemoBanner();
    } finally {
      isProcessing = false;
      setSendEnabled(true);
    }
  };

  window.sendQuickQuestion = function(q) { if (isProcessing) return; inputEl.value = q; sendMessage(); };
  window.clearChat = function() {
    messagesEl.innerHTML = '';
    addMessage('您好！我是您的AI数字人导游「灵灵」，很高兴为您服务。灵山胜境是国家5A级旅游景区，被誉为"东方佛国"。请问您想了解哪个景点，或者需要我为您规划游览路线？', 'bot');
  };

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (isProcessing) return;
      sendMessage();
    }
  });
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 96) + 'px';
  });

  // Web Speech
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang = 'zh-CN'; recognition.continuous = false; recognition.interimResults = false; recognition.maxAlternatives = 1;
    recognition.onresult = function(e) { voiceBtn.className = 'voice-btn'; if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop(); if(mediaRecorder&&mediaRecorder.stream)mediaRecorder.stream.getTracks().forEach(function(t){t.stop()}); sendMessageWithText(e.results[0][0].transcript); };
    recognition.onerror = function() { voiceBtn.className = 'voice-btn'; };
    recognition.onend = function() { voiceBtn.className = 'voice-btn'; };

    voiceBtn.addEventListener('click', function() {
      if (isRecording) {
        if (recognition) recognition.stop();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isRecording = false; voiceBtn.className = 'voice-btn'; return;
      }
      isRecording = true; voiceBtn.className = 'voice-btn recording';
      try { recognition.start(); } catch(e) {}
      if (navigator.mediaDevices) {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          audioChunks = [];
          mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
          mediaRecorder.onstop = function() { stream.getTracks().forEach(function(t) { t.stop(); }); };
          mediaRecorder.start();
          setTimeout(function() {
            if (isRecording) { if (recognition) recognition.stop(); if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); isRecording = false; voiceBtn.className = 'voice-btn'; }
          }, 8000);
        }).catch(function(err) { isRecording=false; voiceBtn.className="voice-btn"; recognition=null; console.warn("Voice getUserMedia error:", err); });
      }
    });
  } else {
    voiceBtn.addEventListener('click', async function() {
      if (isRecording) {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isRecording = false; voiceBtn.className = 'voice-btn'; return;
      }
      try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
        mediaRecorder.onstop = async function() {
          stream.getTracks().forEach(function(t) { t.stop(); });
          var blob = new Blob(audioChunks, { type: 'audio/webm' });
          addMessage('🎤 语音消息', 'user'); showTyping(true);
          try {
            var fd = new FormData(); fd.append('audio', blob, 'voice.webm'); fd.append('text', '');
            var r = await fetch('/chat/voice', { method: 'POST', body: fd });
            var d = await r.json(); showTyping(false); addMessage(d.reply, 'bot', d.audio_url || null);
          } catch(e) { showTyping(false); addMessage('语音处理失败。', 'bot'); }
        };
        mediaRecorder.start(); isRecording = true; voiceBtn.className = 'voice-btn recording';
        setTimeout(function() {
          if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); isRecording = false; voiceBtn.className = 'voice-btn'; }
        }, 10000);
      } catch(err) { addMessage('需要麦克风权限。', 'bot'); voiceBtn.className = 'voice-btn'; }
    });
  }

  function sendMessageWithText(text) {
    addMessage(text, 'user'); showTyping(true); sendBtn.disabled = true;
    fetch('/chat/message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: text, session_id: 'default' }) })
    .then(function(r) { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d) { showTyping(false); addMessage(d.reply || _getMockReply(), 'bot', d.audio_url || null); })
    .catch(function() { showTyping(false); addMessage(_getMockReply(), 'bot'); _showDemoBanner(); })
    .finally(function() { sendBtn.disabled = false; });
  }

  // ── Mock 回复 & 演示模式提示 ──
  function _getMockReply() {
    var idx = Math.floor(Math.random() * MOCK_CHAT_REPLIES.length);
    return '[情绪: happy] ' + MOCK_CHAT_REPLIES[idx];
  }
  var _demoBannerShown = false;
  function _showDemoBanner() {
    if (_demoBannerShown) return;
    _demoBannerShown = true;
    // 在消息区域顶部插入一个提示条
    var banner = document.createElement('div');
    banner.style.cssText = 'background:linear-gradient(135deg,#FFF3E0,#FFE0B2);color:#E65100;padding:10px 16px;margin:0 16px 12px;border-radius:12px;font-size:12px;text-align:center;animation:msgIn .4s ease-out;border:1px solid rgba(230,81,0,.15);';
    banner.textContent = '📡 后端服务未连接，当前为演示模式（离线 Mock 数据）';
    messagesEl.insertBefore(banner, messagesEl.firstChild);
  }
})();
</script>

<script>
/* ========================================

var map = null, mapInitialized = false, mapPanelExpanded = false;
var spotsCache = [], routesCache = [], activitiesCache = [];
var currentDetailSpot = null, previousPage = 'pageHome';

// ── Mock 数据：无后端 / API 不可用时自动回退 ──────────────────
var MOCK_SPOTS = [
  { spot_id:'spot_001', name:'灵山大佛', category:'核心景观', rating:'4.9', lat:31.428, lng:120.088, description:'灵山大佛高88米，是目前世界上最高大的露天青铜释迦牟尼立像，由725吨青铜铸造而成。大佛慈颜微笑，广视众生，右手施"无畏印"代表除却痛苦，左手施"与愿印"代表给予快乐。', highlights:'抱佛脚祈福,青铜艺术瑰宝,九龙灌浴表演', open_hours:'8:00-17:00', ticket_price:'含景区门票' },

  { spot_id:'spot_003', name:'灵山梵宫', category:'建筑奇观', rating:'4.9', lat:31.426, lng:120.090, description:'灵山梵宫被誉为"东方卢浮宫"，汇集了众多佛教艺术珍品。宫内金碧辉煌，木雕、石雕、壁画精美绝伦，是一座佛教文化艺术的殿堂。', highlights:'世界佛教论坛会址,艺术珍品殿堂,建筑美学典范', open_hours:'8:00-17:00', ticket_price:'含景区门票' },
  { spot_id:'spot_004', name:'五印坛城', category:'文化建筑', rating:'4.7', lat:31.432, lng:120.082, description:'五印坛城是藏传佛教风格的建筑，坛城内供奉五方五佛，建筑庄严肃穆，是了解藏传佛教文化的重要场所。', highlights:'藏传佛教文化,唐卡艺术,转经祈福', open_hours:'8:00-17:00', ticket_price:'含景区门票' },
  { spot_id:'spot_005', name:'降魔成道', category:'佛教艺术', rating:'4.6', lat:31.425, lng:120.086, description:'降魔成道是一座富有震撼力的浮雕作品，生动表现了佛陀在菩提树下降伏魔军、悟道成佛的殊胜场景。', highlights:'佛教故事展示,文化教育,拍照打卡', open_hours:'8:00-17:00', ticket_price:'含景区门票' }
];
var MOCK_ACTIVITIES = [
  { name:'九龙灌浴表演', time:'10:00 / 14:00', location:'九龙灌浴广场', tags:'每日定时' },
  { name:'梵宫祈福法会', time:'9:30 / 15:30', location:'灵山梵宫', tags:'不定期' },
  { name:'夜游灵山', time:'18:00-21:00', location:'全景区', tags:'周末限定' }
];
var MOCK_ROUTES = [
  { name:'经典一日游', duration:'约4小时', description:'灵山大佛 → 九龙灌浴 → 灵山梵宫 → 五印坛城，涵盖灵山四大核心景点，适合首次游览。' },
  { name:'深度两日游', duration:'约8小时', description:'D1: 灵山大佛+九龙灌浴+梵宫；D2: 五印坛城+降魔成道+夜游。适合文化深度体验。' },
  { name:'亲子半日游', duration:'约2.5小时', description:'九龙灌浴（表演时间）→ 降魔成道 → 灵山大佛（抱佛脚），轻松愉快的亲子路线。' }
];
var MOCK_CHAT_REPLIES = [
  '灵山胜境最受欢迎的景点是灵山大佛，88米高的青铜佛像非常震撼！建议早上8点入园，先看大佛，再赶10点的九龙灌浴表演。',
  '九龙灌浴每天有两场表演：上午10:00和下午14:00。九条金龙喷出甘露的场景非常壮观，记得提前10分钟到场占个好位置！',
  '灵山梵宫被誉为"东方卢浮宫"，里面珍藏了大量佛教艺术瑰宝。建议游览时间1-1.5小时，慢慢欣赏木雕和壁画。',
  '游览灵山推荐路线：灵山大佛→九龙灌浴→灵山梵宫→五印坛城，全程约4小时。如果时间充裕可以加上夜游项目。',
  '景区开放时间是早上8:00到下午5:00，门票210元。建议上午来，人少景美，光线也适合拍照！',
  '五印坛城是藏传佛教风格建筑，里面的唐卡艺术非常精美。转经筒祈福也是游客最喜欢的体验之一哦！'
];

function navigateTo(pageId) {
  var pages = document.querySelectorAll('.page');
  var target = document.getElementById(pageId);
  if (!target) return;
  pages.forEach(function(p) {
    if (pageId !== 'pageDetail') previousPage = pageId;
    if (p.id === pageId) { p.classList.remove('hidden', 'hidden-left'); }
    else if (!p.classList.contains('hidden')) { p.classList.add('hidden-left'); setTimeout(function() { p.classList.remove('hidden-left'); p.classList.add('hidden'); }, 400); }
  });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var m = { pageHome:0, pageMap:1, pageChat:2 };
  if (m[pageId] !== undefined) document.querySelectorAll('.nav-item')[m[pageId]].classList.add('active');
  var nav = document.querySelector('.bottom-nav');
  if (nav) nav.style.display = (pageId === 'pageDetail') ? 'none' : 'flex';
  if (pageId === 'pageMap' && !mapInitialized) setTimeout(function() { initMap(); }, 100);
  if (pageId === 'pageChat') setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 150);
}
function goBackFromDetail() { navigateTo(previousPage); }

async function loadHomeData() {
  try {
    // 并行请求三个独立API，各自独立处理成功/失败
    var results = await Promise.allSettled([
      fetch('/api/v1/scenic/spots').then(function(r) { return r.json(); }),
      fetch('/api/v1/scenic/activities').then(function(r) { return r.json(); }),
      fetch('/api/v1/scenic/routes').then(function(r) { return r.json(); })
    ]);
    if (results[0].status === 'fulfilled' && results[0].value.data && results[0].value.data.length) spotsCache = results[0].value.data;
    if (results[1].status === 'fulfilled' && results[1].value.data && results[1].value.data.length) activitiesCache = results[1].value.data;
    if (results[2].status === 'fulfilled' && results[2].value.data && results[2].value.data.length) routesCache = results[2].value.data;
  } catch(e) { console.warn('[Home] API 请求失败，使用本地 Mock 数据:', e.message); }

  // ── 回退到 Mock 数据 ──
  if (!spotsCache.length) spotsCache = MOCK_SPOTS;
  if (!activitiesCache.length) activitiesCache = MOCK_ACTIVITIES;
  if (!routesCache.length) routesCache = MOCK_ROUTES;

  renderSpots(); renderActivities(); renderRoutes(); showContent();
}

function renderSpots() {
  var c = document.getElementById('spotsContainer'); if (!c || !spotsCache.length) return;
  var colors = ['#2B5F75','#C73E3A','#4A8FA8','#D4A373','#5A8A6A','#8B7355'];
  c.innerHTML = spotsCache.map(function(s) {
    var col = colors[Math.floor(Math.random()*colors.length)];
    var svg = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="160" height="90"><rect fill="' + col + '" width="160" height="90"/><text x="80" y="45" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">' + s.name + '</text><text x="80" y="65" text-anchor="middle" fill="#fff" font-size="11">' + (s.category||'') + '</text></svg>');
    return '<div class="spot-card" onclick="openDetail(\'' + s.spot_id + '\')"><img class="spot-card-img" src="' + svg + '" alt="' + s.name + '" loading="lazy"><div class="spot-card-info"><h4>' + s.name + '</h4><div class="meta"><span class="rating">&#11088; ' + (s.rating||'4.5') + '</span><span class="tag">' + (s.category||'景观') + '</span></div></div></div>';
  }).join('');
}

function renderActivities() {
  var c = document.getElementById('activitiesContainer'); if (!c || !activitiesCache.length) return;
  c.innerHTML = activitiesCache.map(function(a) {
    return '<div class="activity-item"><div class="activity-thumb" style="background:#C73E3A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">' + a.name.substring(0,4) + '</div><div class="activity-info"><h4>' + a.name + '</h4><p>' + (a.time||'') + ' · ' + (a.location||'') + '</p><span class="activity-tag">' + (a.tags||'活动') + '</span></div></div>';
  }).join('');
}

function renderRoutes() {
  var c = document.getElementById('routesContainer'); if (!c || !routesCache.length) return;
  c.innerHTML = routesCache.map(function(r) {
    return '<div class="route-card" onclick="navigateTo(\'pageChat\');setTimeout(function(){ sendQuickQuestion(\'推荐路线\'); },300);"><div class="route-card-header"><span class="name">' + r.name + '</span><span class="duration">' + (r.duration||'') + '</span></div><div class="spots-preview">' + (r.description||'') + '</div></div>';
  }).join('');
}

function showContent() {
  var el;
  el = document.getElementById('spotsSkeleton'); if(el) el.style.display='none';
  el = document.getElementById('spotsContainer'); if(el) { el.style.display='flex'; el.classList.add('fade-in'); }
  el = document.getElementById('activitiesSkeleton'); if(el) el.style.display='none';
  el = document.getElementById('activitiesContainer'); if(el) { el.style.display='block'; el.classList.add('fade-in'); }
  el = document.getElementById('routesSkeleton'); if(el) el.style.display='none';
  el = document.getElementById('routesContainer'); if(el) { el.style.display='flex'; el.classList.add('fade-in'); }
}

function initMap() {
  if (typeof L === "undefined") { console.warn("Leaflet unavailable"); return; }
  if (mapInitialized) return;
  mapInitialized = true;
  map = L.map('realMap', { center: [31.428, 120.088], zoom: 15, zoomControl: false, attributionControl: false });
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', { subdomains: ['1','2','3','4'], maxZoom: 18 }).addTo(map);
  if (spotsCache.length) {
    spotsCache.forEach(function(spot) {
      var lat = spot.lat || 31.428 + (Math.random()-.5)*0.02;
      var lng = spot.lng || 120.088 + (Math.random()-.5)*0.02;
      var m = L.marker([lat, lng], { icon: L.divIcon({ className: 'custom-marker-wrapper', html: '<div class="custom-marker">📍</div>', iconSize: [36,42], iconAnchor: [18,42] }) }).addTo(map);
      m.bindPopup('<div class="popup-title">' + spot.name + '</div><div class="popup-desc">' + (spot.description||'').substring(0,60) + '...</div>', { maxWidth: 200 });
      m.on('click', function() { updateMapPanel(spot); });
    });
    if (spotsCache[0]) updateMapPanel(spotsCache[0]);
  }
  document.getElementById('mapPanelHandle').addEventListener('click', function() {
    var p = document.getElementById('mapBottomPanel');
    var d = document.getElementById('mapPanelDetail');
    if (mapPanelExpanded) { p.classList.remove('expanded'); if(d) d.style.display='none'; } else { p.classList.add('expanded'); if(d) d.style.display='block'; }
    mapPanelExpanded = !mapPanelExpanded;
  });
}

function updateMapPanel(spot) {
  document.getElementById('mapPanelTitle').textContent = spot.name;
  document.getElementById('mapPanelMeta').innerHTML = '<span>⭐ ' + (spot.rating||'4.5') + '分</span><span>📍 ' + (spot.category||'景观') + '</span>';
  var d = document.getElementById('mapPanelDetail');
  if (d) {
    var hs = '';
    if (spot.highlights) {
      var arr = typeof spot.highlights === 'string' ? spot.highlights.split(',') : (Array.isArray(spot.highlights) ? spot.highlights : []);
      hs = arr.slice(0,3).map(function(h) { return '<span style="padding:3px 10px;background:rgba(43,95,117,.08);color:var(--primary);font-size:12px;border-radius:12px;">' + h.trim() + '</span>'; }).join('');
    }
    d.innerHTML = '<p style="margin-bottom:8px">' + (spot.description||'').substring(0,100) + '...</p><div style="display:flex;gap:8px;flex-wrap:wrap">' + hs + '</div>';
  }
  currentDetailSpot = spot;
}

function navigateToDetailFromMap() { if (currentDetailSpot) openDetail(currentDetailSpot.spot_id); }

window.openDetail = function(spotId) {
  var spot = null;
  for (var i = 0; i < spotsCache.length; i++) { if (spotsCache[i].spot_id === spotId) { spot = spotsCache[i]; break; } }
  if (!spot) return;
  currentDetailSpot = spot;
  document.getElementById('detailHero').style.background = 'linear-gradient(135deg,#2B5F75,#4A8FA8,#1A3A4A)';
  document.getElementById('detailTitle').textContent = spot.name;
  document.getElementById('detailRating').textContent = (spot.rating||'4.5') + '分';
  var st = ''; for (var s = 0; s < Math.floor(spot.rating||4.5); s++) st += '⭐';
  document.getElementById('detailStars').innerHTML = st;

  var hs = '';
  if (spot.highlights) {
    var arr = typeof spot.highlights === 'string' ? spot.highlights.split(',') : (Array.isArray(spot.highlights) ? spot.highlights : []);
    hs = arr.map(function(h) { return '<span style="padding:6px 14px;background:rgba(43,95,117,.08);color:var(--primary);font-size:13px;border-radius:20px;display:inline-block;margin:4px;">' + h.trim() + '</span>'; }).join('');
  }

  document.getElementById('detailBody').innerHTML =
    '<div class="detail-section"><h3>景点介绍</h3><p>' + (spot.description||'暂无介绍') + '</p></div>' +
    (hs ? '<div class="detail-section"><h3>亮点体验</h3><div style="display:flex;flex-wrap:wrap;gap:8px;">' + hs + '</div></div>' : '') +
    '<div class="detail-section"><h3>实用信息</h3><div style="display:flex;flex-direction:column;gap:12px">' +
    '<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-secondary);border-radius:12px"><span style="font-size:20px">🕐</span><div><div style="font-size:14px;font-weight:600;color:var(--text-primary)">开放时间</div><div style="font-size:12px;color:var(--text-muted)">' + (spot.open_hours||'8:00-17:00') + '</div></div></div>' +
    '<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-secondary);border-radius:12px"><span style="font-size:20px">🎫</span><div><div style="font-size:14px;font-weight:600;color:var(--text-primary)">门票</div><div style="font-size:12px;color:var(--text-muted)">' + (spot.ticket_price||'免费（含门票）') + '</div></div></div></div></div>' +
    (routesCache.length ? '<div class="detail-section"><h3>推荐路线</h3><div style="display:flex;flex-direction:column;gap:10px">' + routesCache.map(function(r) { return '<div style="padding:14px;background:linear-gradient(135deg,rgba(43,95,117,.08),rgba(43,95,117,.02));border-radius:12px;border-left:3px solid var(--primary)"><div style="font-size:14px;font-weight:600;color:var(--text-primary)">' + r.name + '（' + (r.duration||'') + '）</div><div style="font-size:12px;color:var(--text-muted);margin-top:6px">' + (r.description||'') + '</div></div>'; }).join('') + '</div></div>' : '');
  navigateTo('pageDetail');
};

document.addEventListener('DOMContentLoaded', function() { loadHomeData(); });
</script>
