<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>杭州西湖 · 水墨导览</title>

<!-- Three.js VRM importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js"
  }
}
</script>
<!-- 备用 CDN: 如果 jsdelivr 不可用，替换为 unpkg.com -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════
   西湖山水主题 — 杭州西湖 · 智慧导览
   翠绿 #2d6a4f / 宣纸 #fefae0 / 琥珀 #d4a373 / 墨色 #1b1b1b
   （与 theme JSON 定义一致）
   ═══════════════════════════════════════════════════════════ */

:root {
  --primary: #2d6a4f;
  --primary-rgb: 45, 106, 79;
  --primary-light: #40916c;
  --primary-dark: #1b4332;
  --bg: #fefae0;
  --bg-rgb: 254, 250, 224;
  --accent: #d4a373;
  --accent-rgb: 212, 163, 115;
  --accent-light: #e9c46a;
  --text: #1b1b1b;
  --text-light: #6b7280;
  --surface: rgba(255,252,245,0.95);
  --shadow: 0 4px 24px rgba(0,0,0,.06);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Serif SC", "PingFang SC", "STSong", "SimSun", serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 30%, rgba(var(--primary-rgb),.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(var(--accent-rgb),.05) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 85%, rgba(var(--primary-rgb),.04) 0%, transparent 45%),
    linear-gradient(180deg, transparent 0%, rgba(var(--accent-rgb),.02) 100%);
  color: var(--text);
  height: 100vh; overflow: hidden;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q40 15 30 25 Q20 15 30 5' fill='none' stroke='%236b7280' stroke-width='.3' opacity='.15'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ── 布局 ── */
.app { display: flex; height: 100vh; }

/* ═══════════════════════════════════════════════════════════
   景点侧栏 240px
   ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: 240px; min-width: 240px;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(0,0,0,.06);
}

/* 侧栏头部 */
.sidebar-header {
  padding: 22px 16px 14px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.sidebar-header .logo-icon {
  width: 52px; height: 52px; margin: 0 auto 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  box-shadow: 0 4px 16px rgba(var(--primary-rgb),.25);
}
.sidebar-header h2 {
  font-size: 14px; font-weight: 600;
  color: var(--primary); letter-spacing: 2px;
}
.sidebar-header .sub {
  font-size: 11px; color: var(--text-light); margin-top: 3px;
}

/* 景点列表 */
.scenic-list {
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.scenic-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.55);
  cursor: pointer; user-select: none;
  transition: all .2s;
  border: 1px solid transparent;
}
.scenic-item:hover {
  background: rgba(var(--primary-rgb),.08);
  border-color: rgba(var(--primary-rgb),.15);
  transform: translateX(4px);
}
.scenic-item:active {
  transform: translateX(2px);
  background: rgba(var(--primary-rgb),.12);
}
.scenic-item .emoji { font-size: 20px; line-height: 1; }
.scenic-item .info { min-width: 0; }
.scenic-item .name { font-size: 13px; font-weight: 500; color: var(--text); }
.scenic-item .desc { font-size: 11px; color: var(--text-light); margin-top: 1px; }

/* VRM 3D 数字人容器 — 磨砂玻璃效果 */
.live2d-section {
  flex: 1; margin: 6px 12px 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(var(--primary-rgb),.04) 0%, rgba(var(--bg-rgb),.4) 100%);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.5);
}
#live2d-canvas { width: 100%; height: 100%; object-fit: contain; }
.avatar-fallback {
  display: none; flex-direction: column; align-items: center; gap: 6px;
  color: var(--primary);
}
.avatar-fallback .icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff;
  box-shadow: 0 6px 24px rgba(var(--primary-rgb),.25);
}
.avatar-fallback .label { font-size: 12px; opacity: .65; }
.avatar-fallback.show { display: flex; }

/* 状态栏 */
.status-bar {
  padding: 10px 16px;
  border-top: 1px solid rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 8px; font-size: 12px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #9ca3af; transition: background .3s;
}
.status-dot.online { background: #22c55e; }
.status-dot.speaking { background: var(--accent); animation: pulse .6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══════════════════════════════════════════════════════════
   主区
   ═══════════════════════════════════════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  background: transparent;
}

/* ── 导航栏 ── */
.chat-header {
  padding: 14px 24px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 16px rgba(var(--primary-rgb),.2);
  position: relative; z-index: 1;
}
.chat-header .logo {
  font-family: "Ma Shan Zheng", "KaiTi", cursive;
  font-size: 20px; font-weight: 400;
  color: #fff; letter-spacing: 3px;
}
.chat-header .badge {
  background: rgba(255,255,255,.15);
  color: #fff; font-size: 10px;
  padding: 2px 10px; border-radius: 20px;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
}

/* ── 消息区 ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; z-index: 1;
}
.msg {
  max-width: 75%; padding: 12px 16px;
  border-radius: var(--radius-sm);
  line-height: 1.7; font-size: 14px;
  animation: fadeIn .3s ease;
  position: relative;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 用户气泡：水墨笔触边框 */
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fefae0;
  border-bottom-right-radius: 2px;
  box-shadow: 0 2px 12px rgba(var(--primary-rgb),.15);
  border: 1px solid rgba(255,255,255,.1);
}
/* AI 气泡：宣纸质感 */
.msg.bot {
  align-self: flex-start;
  background: var(--surface);
  color: var(--text);
  border-bottom-left-radius: 2px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(var(--accent-rgb),.12);
  border-left: 3px solid var(--accent);
}
.msg .time {
  font-size: 10px; opacity: .5; margin-top: 6px; text-align: right;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
  writing-mode: horizontal-tb;
}
.msg.bot .time { color: var(--text-light); }

/* ── 快捷入口 × 5 ── */
.quick-actions {
  display: flex; gap: 8px;
  padding: 8px 24px 4px;
  flex-wrap: wrap;
}
.quick-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 14px;
  border: 1px solid rgba(var(--primary-rgb),.15);
  border-radius: 6px;
  background: var(--surface);
  color: var(--primary);
  font-size: 12px;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
  cursor: pointer; user-select: none;
  transition: all .2s;
  white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.quick-btn:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(var(--primary-rgb),.18);
}
.quick-btn:active {
  transform: translateY(0);
  background: var(--primary-dark);
}

/* ── 人群标签 ── */
.crowd-tags {
  display: flex; gap: 6px;
  padding: 4px 24px 8px;
  flex-wrap: wrap;
}
.crowd-tag {
  padding: 5px 12px;
  border: 1px solid rgba(var(--accent-rgb),.2);
  border-radius: 16px;
  background: rgba(255,252,245,.7);
  color: var(--accent);
  font-size: 11px;
  cursor: pointer; user-select: none;
  transition: all .2s;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
}
.crowd-tag:hover, .crowd-tag.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* ── 底部 footer ── */
.footer {
  padding: 8px 24px;
  background: var(--primary-dark);
  color: rgba(255,255,255,.6);
  font-size: 11px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}

/* ── 打字动画 ── */
.typing {
  align-self: flex-start;
  margin: 4px 24px;
  background: var(--surface);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  display: none; gap: 4px;
  box-shadow: var(--shadow);
  /* 脱离正常流，避免布局抖动 */
  position: absolute;
  z-index: 1;
  transition: opacity .15s;
  opacity: 0; pointer-events: none;
}
.typing.show {
  display: flex;
  opacity: 1;
  pointer-events: auto;
  position: relative;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* ── 输入区 ── */
.input-area {
  padding: 10px 24px 16px;
  display: flex; gap: 10px; align-items: center;
}
.input-area input {
  flex: 1; padding: 10px 16px;
  border: 2px solid var(--primary-light);
  border-radius: 12px;
  font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: rgba(255,255,255,.85);
}
.input-area input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(var(--primary-rgb),.12);
}
.input-area input::placeholder { color: var(--text-light); }

/* 按钮配色（使用 CSS 变量） */
.btn {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all .2s;
  background: var(--primary); color: #fff; flex-shrink: 0;
}
.btn:hover { background: var(--primary-dark); transform: scale(1.05); }
.btn:active { transform: scale(.95); }
.btn.voice { background: var(--accent); }
.btn.voice:hover { background: var(--accent-light); }
.btn.voice.recording { background: #ef4444; animation: pulse-red .8s ease-in-out infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ── 滚动条 ── */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* ═══════════════════════════════════════════════════════════
   响应式 — 768px 断点（平板/小桌面）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .app { flex-direction: column-reverse; }

  /* 侧栏变为底部抽屉 */
  .sidebar {
    width: 100%; min-width: 0; max-height: 38vh;
    flex-direction: row; overflow-x: auto;
    border-right: none; border-top: 1px solid rgba(0,0,0,.06);
  }
  .sidebar-header { padding: 10px 12px; border-bottom: none; border-right: 1px solid rgba(0,0,0,.05); flex-shrink: 0; }
  .sidebar-header .logo-icon { width: 36px; height: 36px; font-size: 18px; margin-bottom: 4px; }
  .sidebar-header h2 { font-size: 12px; }
  .sidebar-header .sub { display: none; }

  /* 景点列表横向滚动 */
  .scenic-list { flex-direction: row; padding: 8px; gap: 8px; flex-shrink: 0; }
  .scenic-item { flex-shrink: 0; padding: 6px 10px; }
  .scenic-item .desc { display: none; }

  /* VRM 区域隐藏（移动端不显示数字人） */
  .live2d-section { display: none; }
  .status-bar { display: none; }

  /* 主区占满 */
  .main { flex: 1; height: 62vh; }
  .msg { max-width: 85%; }
  .messages { padding: 12px 16px; }
  .quick-actions { padding: 6px 16px 2px; gap: 6px; }
  .quick-btn { font-size: 11px; padding: 6px 12px; }
  .input-area { padding: 10px 16px 14px; }
  .footer { font-size: 9px; padding: 6px 12px; }
  .footer span:last-child { display: none; }
}

/* ═══════════════════════════════════════════════════════════
   响应式 — 480px 断点（手机）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 480px) {
  .chat-header { padding: 10px 14px; }
  .chat-header .logo { font-size: 15px; }
  .chat-header .badge { font-size: 10px; }
  .messages { padding: 10px 12px; gap: 12px; }
  .msg { max-width: 90%; padding: 10px 12px; font-size: 13px; }
  .quick-actions { padding: 4px 12px 2px; gap: 4px; flex-wrap: wrap; }
  .quick-btn { font-size: 10px; padding: 5px 10px; }
  .input-area { padding: 8px 12px 12px; gap: 8px; }
  .input-area input { padding: 8px 12px; font-size: 16px; border-radius: 10px; }
  .btn { width: 36px; height: 36px; font-size: 16px; }
  .footer { display: none; }

  /* 底部抽屉更紧凑 */
  .sidebar { max-height: 30vh; }
  .sidebar-header { padding: 8px 10px; }
  .sidebar-header .logo-icon { width: 32px; height: 32px; font-size: 16px; }
  .scenic-item { padding: 5px 8px; }
  .scenic-item .name { font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ═══════════════════════════════════════════════════════
       景点侧栏 240px
       ═══════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🏔️</div>
      <h2>西湖十景</h2>
      <div class="sub">West Lake · Ten Scenes</div>
    </div>

    <!-- 景点快捷入口 -->
    <div class="scenic-list">
      <div class="scenic-item" data-query="请介绍一下三潭印月">
        <span class="emoji">🏛️</span>
        <div class="info">
          <div class="name">三潭印月</div>
          <div class="desc">西湖第一胜景</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下苏堤春晓">
        <span class="emoji">🌿</span>
        <div class="info">
          <div class="name">苏堤春晓</div>
          <div class="desc">春日漫步好去处</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下断桥残雪">
        <span class="emoji">🌉</span>
        <div class="info">
          <div class="name">断桥残雪</div>
          <div class="desc">许仙白娘子相会</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下雷峰夕照">
        <span class="emoji">🌅</span>
        <div class="info">
          <div class="name">雷峰夕照</div>
          <div class="desc">雷锋塔下夕阳红</div>
        </div>
      </div>
    </div>

    <!-- VRM 3D 数字人容器（磨砂玻璃） -->
    <div class="live2d-section">
      <canvas id="live2d-canvas"></canvas>
      <div class="avatar-fallback show" id="avatar-fallback">
        <div class="icon">🗣️</div>
        <div class="label">数字人导游 · 小西</div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-dot online" id="status-dot"></span>
      <span id="status-text">在线 · 随时为你服务</span>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════
       主区：对话
       ═══════════════════════════════════════════════════════ -->
  <main class="main">
    <!-- 导航栏 -->
    <div class="chat-header">
      <div class="logo">杭州西湖 · 水墨导览</div>
      <span class="badge">AI 小西</span>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages"></div>

    <!-- 人群属性标签 -->
    <div class="crowd-tags" id="crowd-tags">
      <button class="crowd-tag" data-query="推荐一条适合家庭出游的西湖路线，有老人小孩">👨‍👩‍👧‍👦 家庭</button>
      <button class="crowd-tag" data-query="推荐一条适合情侣约会的西湖浪漫路线">💑 情侣</button>
      <button class="crowd-tag" data-query="推荐一条适合朋友结伴的西湖打卡路线">👫 朋友</button>
      <button class="crowd-tag" data-query="推荐一条适合老年人游西湖的轻松路线，少走路">👴 老人</button>
      <button class="crowd-tag" data-query="推荐一条适合小朋友游西湖的亲子路线">👶 儿童</button>
    </div>

    <!-- 5 个实用快捷入口 -->
    <div class="quick-actions">
      <button class="quick-btn" data-query="西湖附近有什么好吃的推荐？住宿在哪里比较方便？">🍜 吃住推荐</button>
      <button class="quick-btn" data-query="去西湖怎么坐地铁和公交？自驾停哪里？">🚇 交通指引</button>
      <button class="quick-btn" data-query="推荐一条西湖一日游路线">🗺️ 路线推荐</button>
      <button class="quick-btn" data-query="西湖有哪些景点？请全部介绍一下">🏛️ 景点汇总</button>
      <button class="quick-btn" id="toilet-btn">🚻 厕所位置</button>
    </div>

    <!-- 打字动画 -->
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" id="text-input" placeholder="请输入您的问题…" />
      <button class="btn voice" id="voice-btn" title="语音输入">🎤</button>
      <button class="btn" id="send-btn" title="发送">↩</button>
    </div>

    <!-- 底部 footer -->
    <footer class="footer">
      <span>第十五届"中国软件杯" A5 赛题 · 景区导览AI数字人</span>
      <span>水墨画风 · DeepSeek · FunASR · Edge-TTS · 3D VRM</span>
    </footer>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════
   3D VRM 数字人渲染模块（Three.js + @pixiv/three-vrm）
   ═══════════════════════════════════════════════════════════ -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from '@pixiv/three-vrm';

// --- 全局状态 ---
let currentVrm = null;
let clock = new THREE.Clock();
let audioContext = null;
let audioAnalyser = null;
let isSpeaking = false;

// --- 初始化 Three.js 场景 ---
const canvas = document.getElementById('live2d-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, canvas.clientWidth / canvas.clientHeight, 0.1, 20);
camera.position.set(0, 0.5, 1.5);

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// --- 灯光 ---
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(1, 1, 1);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// --- 加载 VRM 模型 ---
const loader = new GLTFLoader();
loader.register((plugin) => new VRMLoaderPlugin(plugin));
const fallback = document.getElementById('avatar-fallback');

loader.load(
  '/static/vrm/AliciaSolid.vrm',
  (gltf) => {
    const vrm = gltf.userData.vrm;
    currentVrm = vrm;
    scene.add(vrm.scene);
    // 启用自动眨眼
    if (vrm.blendShapeProxy) vrm.blendShapeProxy.setAutoBlinkEnabled(true);
    vrm.scene.rotation.y = Math.PI;
    if (fallback) fallback.classList.remove('show');
  },
  null,
  () => {
    if (fallback) fallback.classList.add('show');
  }
);

// --- 动画循环 ---
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // 音频口型同步
  if (isSpeaking && audioAnalyser && currentVrm?.blendShapeProxy) {
    const data = new Uint8Array(audioAnalyser.frequencyBinCount);
    audioAnalyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    const weight = Math.min(rms * 2, 1.0) * 0.7;
    // 'aa' BlendShape 控制张嘴幅度
    currentVrm.blendShapeProxy.setValue('aa', weight);
  }

  if (currentVrm) currentVrm.update(delta);
  renderer.render(scene, camera);
}
animate();

// --- 窗口自适应 ---
window.addEventListener('resize', () => {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// --- 表情切换接口 ---
window.setVRMExpression = function(emotionName) {
  if (!currentVrm?.blendShapeProxy) return;
  currentVrm.blendShapeProxy.setValue(emotionName, 1.0);
  // 4 秒后恢复 neutral
  setTimeout(() => {
    currentVrm?.blendShapeProxy?.setValue('neutral', 1.0);
  }, 4000);
};

// --- 音频播放 + 口型同步 ---
window.playVRMAudio = async function(audioUrl) {
  try {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    await audioContext.resume();

    const resp = await fetch(audioUrl);
    const arrayBuffer = await resp.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;

    audioAnalyser = audioContext.createAnalyser();
    audioAnalyser.fftSize = 256;
    source.connect(audioAnalyser);
    audioAnalyser.connect(audioContext.destination);

    isSpeaking = true;
    source.start();

    return new Promise((resolve) => {
      source.onended = () => {
        isSpeaking = false;
        audioAnalyser = null;
        resolve();
      };
    });
  } catch (err) {
    isSpeaking = false;
    throw err;
  }
};

</script>

<script>
// ═══════════════════════════════════════════════════════════
//  A5 · 景区导览 AI 数字人 — 前端逻辑
// ═══════════════════════════════════════════════════════════

(function() {
  'use strict';

  // ── DOM 引用 ──
  const $ = id => document.getElementById(id);
  const messagesEl = $('messages');
  const inputEl = $('text-input');
  const sendBtn = $('send-btn');
  const voiceBtn = $('voice-btn');
  const typingEl = $('typing');
  const statusDot = $('status-dot');
  const statusText = $('status-text');
  const canvas = $('live2d-canvas');
  const fallback = $('avatar-fallback');

  // ── 状态 ──
  let isRecording = false;
  let recognition = null;
  let mediaRecorder = null;
  let audioChunks = [];
  const CHAT_STORAGE_KEY = 'a5_chat_history';
  const MAX_HISTORY = 50;

  // ── localStorage 持久化 ──
  function saveHistory() {
    const msgs = [];
    messagesEl.querySelectorAll('.msg').forEach(el => {
      msgs.push({
        role: el.classList.contains('user') ? 'user' : 'bot',
        text: el.childNodes[0] ? el.childNodes[0].textContent : '',
        time: el.querySelector('.time') ? el.querySelector('.time').textContent : '',
      });
    });
    if (msgs.length > MAX_HISTORY) msgs.splice(0, msgs.length - MAX_HISTORY);
    try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(msgs)); } catch(e) {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(CHAT_STORAGE_KEY);
      if (!raw) return false;
      const msgs = JSON.parse(raw);
      if (!msgs.length) return false;
      msgs.forEach(m => addMessage(m.text, m.role));
      return true;
    } catch(e) { return false; }
  }

  // ── VRM BlendShape 情绪映射 ──
  const VRM_EMOTION_MAP = {
    'happy': 'happy',
    'sad': 'sad',
    'angry': 'angry',
    'surprise': 'surprised',
    'neutral': 'neutral',
  };
  let emotionTimeout = null;

  // ── 解析 bot 回答中的情绪标签 ──
  function parseBotResponse(text) {
    const match = text.match(/\[情绪:\s*(\w+)\]/);
    if (match) {
      const emotion = match[1].toLowerCase();
      const reply = text.replace(/\[情绪:\s*\w+\]/, '').trim();
      return { reply, emotion };
    }
    return { reply: text, emotion: null };
  }

  // ── 驱动 VRM 表情切换（口型结束后调用） ──
  function scheduleEmotion(emotion) {
    const expressionName = VRM_EMOTION_MAP[emotion];
    if (!expressionName) return;
    // 300ms 延迟确保口型同步动画不被打断
    setTimeout(() => {
      if (typeof window.setVRMExpression === 'function') {
        window.setVRMExpression(expressionName);
      }
      // 4 秒后恢复 neutral
      if (emotionTimeout) clearTimeout(emotionTimeout);
      emotionTimeout = setTimeout(() => {
        if (typeof window.setVRMExpression === 'function') {
          window.setVRMExpression('neutral');
        }
      }, 4000);
    }, 300);
  }

  // ── 添加消息 ──
  function addMessage(text, role, audioUrl) {
    // 解析 bot 消息中的情绪标签
    let parsedEmotion = null;
    let displayText = text;
    if (role === 'bot') {
      const parsed = parseBotResponse(text);
      displayText = parsed.reply;
      parsedEmotion = parsed.emotion;
    }

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const timeSpan = document.createElement('div');
    timeSpan.className = 'time';
    timeSpan.textContent = time;
    div.textContent = displayText;
    div.appendChild(timeSpan);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    saveHistory();

    // 音频播放 → 口型同步 → 表情切换
    if (role === 'bot' && audioUrl) {
      setSpeaking(true);
      playVRMAudio(audioUrl)
        .then(() => {
          setSpeaking(false);
          if (parsedEmotion) scheduleEmotion(parsedEmotion);
        })
        .catch(() => {
          const audio = new Audio(audioUrl);
          audio.play().catch(() => {});
          audio.onended = () => {
            setSpeaking(false);
            if (parsedEmotion) scheduleEmotion(parsedEmotion);
          };
          audio.onerror = () => {
            setSpeaking(false);
            if (parsedEmotion) scheduleEmotion(parsedEmotion);
          };
        });
    } else if (role === 'bot' && parsedEmotion) {
      // 无音频：延迟 300ms 切换表情
      setTimeout(() => scheduleEmotion(parsedEmotion), 300);
    }
  }

  // ── 设置状态 ──
  function setSpeaking(speaking) {
    if (speaking) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在播报…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  function setListening(listening) {
    if (listening) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在聆听…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  // ── 显示打字动画 ──
  function showTyping(show) {
    if (show) {
      typingEl.classList.add('show');
    } else {
      typingEl.classList.remove('show');
    }
  }

  // ── 发送文字消息 ──
  async function sendTextMessage(text) {
    if (!text.trim()) return;
    addMessage(text, 'user');
    inputEl.value = '';
    sendBtn.disabled = true;
    showTyping(true);

    try {
      const resp = await fetch('/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text }),
      });
      const data = await resp.json();
      showTyping(false);
      // data.reply 保留原始情绪标签用于展示，addMessage 内已通过 parseBotResponse 自动调度表情
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('网络连接失败，请检查服务是否运行。', 'bot');
    } finally {
      sendBtn.disabled = false;
    }
  }

  // ── 发送语音消息 ──
  async function sendVoiceMessage(audioBlob, asrText) {
    if (!audioBlob && !asrText) return;
    if (asrText) addMessage(asrText, 'user');
    else addMessage('🎤 语音消息', 'user');
    showTyping(true);

    try {
      const formData = new FormData();
      if (audioBlob) formData.append('audio', audioBlob, 'voice.webm');
      formData.append('text', asrText || '');
      const resp = await fetch('/chat/voice', { method: 'POST', body: formData });
      const data = await resp.json();
      showTyping(false);
      if (data.asr_text && !asrText) {
        messagesEl.lastChild.textContent = data.asr_text;
      }
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('语音处理失败，请重试或使用文字输入。', 'bot');
    }
  }

  // ── 流式 TTS 播放（SSE + Web Audio API） ──
  let audioCtx = null;
  let audioScheduledTime = 0;

  async function playVoiceStream(text, onDone) {
    if (!text) { if (onDone) onDone(); return; }

    try {
      const resp = await fetch('/chat/stream-tts?text=' + encodeURIComponent(text));
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      // 初始化 AudioContext（需在用户交互后创建）
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      await audioCtx.resume();
      audioScheduledTime = Math.max(audioScheduledTime, audioCtx.currentTime);
      setSpeaking(true);

      let buf = '';
      let hasAudio = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const msg = JSON.parse(line.slice(6));
            if (msg.type === 'audio') {
              hasAudio = true;
              // base64 → ArrayBuffer
              const binary = atob(msg.data);
              const bytes = new Uint8Array(binary.length);
              for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

              // 解码并调度播放
              try {
                const audioBuf = await audioCtx.decodeAudioData(bytes.buffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuf;
                source.connect(audioCtx.destination);
                source.start(audioScheduledTime);
                audioScheduledTime += audioBuf.duration;
              } catch (e) {
                logger.debug('[Stream] 解码失败: %s', e);
              }
            } else if (msg.type === 'done') {
              // 全部接收完毕
            }
          } catch (e) {
            logger.debug('[Stream] 解析错误: %s', e);
          }
        }
      }

      // 等待所有音频播放完毕
      if (hasAudio) {
        const waitSec = Math.max(0, audioScheduledTime - audioCtx.currentTime);
        await new Promise(r => setTimeout(r, (waitSec + 0.3) * 1000));
      }
      setSpeaking(false);
      if (onDone) onDone();
    } catch (err) {
      setSpeaking(false);
      if (onDone) onDone();
      if (onDone) onDone();
    }
  }

  // ── 事件绑定 ──

  // 发送按钮
  sendBtn.addEventListener('click', () => sendTextMessage(inputEl.value));

  // 回车发送
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTextMessage(inputEl.value);
    }
  });

  // ── 快捷按钮事件 ──
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const query = btn.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ── 厕所按钮 ──
  const toiletBtn = document.getElementById('toilet-btn');
  if (toiletBtn) {
    toiletBtn.addEventListener('click', () => {
      const toiletInfo = [
        '🚻 西湖周边公共厕所位置：\n',
        '1. 断桥入口 — 北山街断桥入口处',
        '2. 苏堤南口 — 南山路苏堤入口',
        '3. 花港观鱼 — 花港公园内',
        '4. 雷峰塔 — 雷峰塔景区入口旁',
        '5. 三潭印月 — 湖滨码头售票处旁',
        '6. 音乐喷泉 — 湖滨路音乐喷泉广场',
        '7. 白堤中段 — 平湖秋月旁',
        '8. 柳浪闻莺 — 柳浪闻莺公园内',
        '\n💡 所有厕所均免费开放，部分有第三卫生间。'
      ].join('\n');
      addMessage('🚻 西湖厕所位置', 'user');
      addMessage(toiletInfo, 'bot');
    });
  }

  // ── 人群标签事件 ──
  document.querySelectorAll('.crowd-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const query = tag.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ── 景点侧栏事件 ──
  document.querySelectorAll('.scenic-item').forEach(item => {
    item.addEventListener('click', () => {
      const query = item.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ═════════════════════════════════════════════════════════
  //  语音输入：Web Speech API (降级 ASR)
  // ═════════════════════════════════════════════════════════

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = event => {
      const transcript = event.results[0][0].transcript;
      setListening(false);
      voiceBtn.className = 'btn voice';
      sendTextMessage(transcript);
    };

    recognition.onerror = event => {
      setListening(false);
      voiceBtn.className = 'btn voice';
      if (event.error === 'no-speech') {
        addMessage('没有检测到语音，请重试。', 'bot');
      }
    };

    recognition.onend = () => {
      setListening(false);
      voiceBtn.className = 'btn voice';
    };

    voiceBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      isRecording = true;
      voiceBtn.className = 'btn voice recording';
      setListening(true);

      try { recognition.start(); }
      catch (e) { /* 语音启动失败，用户无反馈 */ }

      if (navigator.mediaDevices) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(stream => {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
            mediaRecorder.start();
            setTimeout(() => {
              if (isRecording) {
                recognition.stop();
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                  mediaRecorder.stop();
                }
                isRecording = false;
                voiceBtn.className = 'btn voice';
                setListening(false);
              }
            }, 8000);
          })
          .catch(err => { /* 麦克风权限被拒绝 */ });
      }
    });
  } else {
    voiceBtn.addEventListener('click', async () => {
      if (isRecording) {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          setListening(false);
          await sendVoiceMessage(blob, '');
        };
        mediaRecorder.start();
        isRecording = true;
        voiceBtn.className = 'btn voice recording';
        setListening(true);
        setTimeout(() => {
          if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            voiceBtn.className = 'btn voice';
            setListening(false);
          }
        }, 10000);
      } catch (err) {
        addMessage('需要麦克风权限才能使用语音输入。', 'bot');
        voiceBtn.className = 'btn voice';
      }
    });
  }

  // ═════════════════════════════════════════════════════════
  //  3D VRM 初始化（由上方 <script type="module"> 自动执行）
  //  只需确保 canvas 和 fallback 引用正确
  // ═════════════════════════════════════════════════════════

  // 3D 场景由 type="module" 脚本自动初始化，fallback 默认可见
  // VRM 加载成功时自动隐藏，加载失败则保留显示

  // 尝试恢复历史对话
  const hasHistory = loadHistory();
  if (!hasHistory) {
    // 首次访问：AI 主动欢迎引导
    setTimeout(() => {
      addMessage('🏔️ 欢迎来到杭州西湖！我是您的智能导游 **小西**。\n\n在为您推荐路线之前，想先了解您的情况：\n\n👥 **和谁一起？** — 家庭出游 / 情侣约会 / 朋友结伴 / 带老人 / 带小朋友\n🚗 **出行方式？** — 自驾 / 地铁 / 公交 / 打车\n⏰ **游玩时长？** — 半天 / 一天 / 两天\n💰 **预算偏好？** — 经济实惠 / 适中 / 奢华体验\n\n您可以点击下方标签或直接告诉我哦～', 'bot');
    }, 500);
  }

})();
</script>
