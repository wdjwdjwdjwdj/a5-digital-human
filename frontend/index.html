<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州西湖 · 智慧导览</title>
<style>
/* ═══════════════════════════════════════════════════════════
   设计主题：杭州西湖 · 智慧导览
   主色 #2d6a4f / 底色 #fefae0 / 强调色 #d4a373
   ═══════════════════════════════════════════════════════════ */
:root {
  --primary: #2d6a4f;
  --primary-light: #40916c;
  --primary-dark: #1b4332;
  --bg: #fefae0;
  --accent: #d4a373;
  --accent-light: #e9c46a;
  --text: #1b1b1b;
  --text-light: #6b7280;
  --surface: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Sans SC", "PingFang SC", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, sans-serif;
  background: #fefae0;
  /* 水波纹渐变装饰 */
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(45,106,79,.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 25%, rgba(212,163,115,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 75%, rgba(64,145,108,.05) 0%, transparent 45%);
  color: var(--text);
  height: 100vh; overflow: hidden;
}

/* ── 布局 ── */
.app { display: flex; height: 100vh; }

/* ═══════════════════════════════════════════════════════════
   景点侧栏 240px
   ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: 240px; min-width: 240px;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(0,0,0,.06);
}

/* 侧栏头部 */
.sidebar-header {
  padding: 22px 16px 14px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.sidebar-header .logo-icon {
  width: 52px; height: 52px; margin: 0 auto 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  box-shadow: 0 4px 16px rgba(45,106,79,.25);
}
.sidebar-header h2 {
  font-size: 14px; font-weight: 600;
  color: var(--primary); letter-spacing: 2px;
}
.sidebar-header .sub {
  font-size: 11px; color: var(--text-light); margin-top: 3px;
}

/* 景点列表 */
.scenic-list {
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.scenic-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.55);
  cursor: pointer; user-select: none;
  transition: all .2s;
  border: 1px solid transparent;
}
.scenic-item:hover {
  background: rgba(45,106,79,.08);
  border-color: rgba(45,106,79,.15);
  transform: translateX(4px);
}
.scenic-item:active {
  transform: translateX(2px);
  background: rgba(45,106,79,.12);
}
.scenic-item .emoji { font-size: 20px; line-height: 1; }
.scenic-item .info { min-width: 0; }
.scenic-item .name { font-size: 13px; font-weight: 500; color: var(--text); }
.scenic-item .desc { font-size: 11px; color: var(--text-light); margin-top: 1px; }

/* Live2D 容器 — 磨砂玻璃效果 */
.live2d-section {
  flex: 1; margin: 6px 12px 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(45,106,79,.04) 0%, rgba(254,250,224,.4) 100%);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.5);
}
#live2d-canvas { width: 100%; height: 100%; object-fit: contain; }
.avatar-fallback {
  display: none; flex-direction: column; align-items: center; gap: 6px;
  color: var(--primary);
}
.avatar-fallback .icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff;
  box-shadow: 0 6px 24px rgba(45,106,79,.25);
}
.avatar-fallback .label { font-size: 12px; opacity: .65; }
.avatar-fallback.show { display: flex; }

/* 状态栏 */
.status-bar {
  padding: 10px 16px;
  border-top: 1px solid rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 8px; font-size: 12px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #9ca3af; transition: background .3s;
}
.status-dot.online { background: #22c55e; }
.status-dot.speaking { background: var(--accent); animation: pulse .6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══════════════════════════════════════════════════════════
   主区
   ═══════════════════════════════════════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  background: transparent;
}

/* ── 导航栏 #2d6a4f 白字 ── */
.chat-header {
  padding: 14px 24px;
  background: var(--primary);
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 16px rgba(45,106,79,.18);
}
.chat-header .logo {
  font-size: 17px; font-weight: 600;
  color: #fff; letter-spacing: 1.5px;
}
.chat-header .badge {
  background: rgba(255,255,255,.18);
  color: #fff; font-size: 11px;
  padding: 2px 10px; border-radius: 20px;
}

/* ── 消息区 ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.msg {
  max-width: 75%; padding: 12px 16px;
  border-radius: var(--radius-sm);
  line-height: 1.6; font-size: 14px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 用户气泡：#2d6a4f 背景 + 白字 */
.msg.user {
  align-self: flex-end;
  background: var(--primary); color: #fff;
  border-bottom-right-radius: 4px;
}

/* AI 气泡：#ffffff 背景 + 黑字 */
.msg.bot {
  align-self: flex-start;
  background: var(--surface); color: #1b1b1b;
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
}
.msg .time { font-size: 11px; opacity: .6; margin-top: 4px; text-align: right; }
.msg.bot .time { color: var(--text-light); }

/* ── 快捷按钮 × 4 ── */
.quick-actions {
  display: flex; gap: 8px;
  padding: 6px 24px 2px;
  flex-wrap: wrap;
}
.quick-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  border: 1px solid rgba(45,106,79,.2);
  border-radius: 20px;
  background: rgba(255,255,255,.7);
  color: var(--primary-dark);
  font-size: 12px;
  cursor: pointer; user-select: none;
  transition: all .2s;
  white-space: nowrap;
}
.quick-btn:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(45,106,79,.2);
}
.quick-btn:active {
  transform: translateY(0);
  background: var(--primary-dark);
}

/* ── 底部 footer ── */
.footer {
  padding: 8px 24px;
  background: var(--primary-dark);
  color: rgba(255,255,255,.6);
  font-size: 11px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}

/* ── 打字动画 ── */
.typing {
  align-self: flex-start;
  margin: 4px 24px;
  background: var(--surface);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  display: none; gap: 4px;
  box-shadow: var(--shadow);
  /* 脱离正常流，避免布局抖动 */
  position: absolute;
  z-index: 1;
  transition: opacity .15s;
  opacity: 0; pointer-events: none;
}
.typing.show {
  display: flex;
  opacity: 1;
  pointer-events: auto;
  position: relative;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* ── 输入区 ── */
.input-area {
  padding: 10px 24px 16px;
  display: flex; gap: 10px; align-items: center;
}
.input-area input {
  flex: 1; padding: 10px 16px;
  border: 2px solid #40916c;
  border-radius: 12px;
  font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: rgba(255,255,255,.85);
}
.input-area input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45,106,79,.12);
}
.input-area input::placeholder { color: var(--text-light); }

/* 按钮 #2d6a4f, hover #1b4332 */
.btn {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all .2s;
  background: var(--primary); color: #fff; flex-shrink: 0;
}
.btn:hover { background: var(--primary-dark); transform: scale(1.05); }
.btn:active { transform: scale(.95); }
.btn.voice { background: var(--accent); }
.btn.voice:hover { background: #c49463; }
.btn.voice.recording { background: #ef4444; animation: pulse-red .8s ease-in-out infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ── 滚动条 ── */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* ═══════════════════════════════════════════════════════════
   响应式 — 768px 断点（平板/小桌面）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .app { flex-direction: column-reverse; }

  /* 侧栏变为底部抽屉 */
  .sidebar {
    width: 100%; min-width: 0; max-height: 38vh;
    flex-direction: row; overflow-x: auto;
    border-right: none; border-top: 1px solid rgba(0,0,0,.06);
  }
  .sidebar-header { padding: 10px 12px; border-bottom: none; border-right: 1px solid rgba(0,0,0,.05); flex-shrink: 0; }
  .sidebar-header .logo-icon { width: 36px; height: 36px; font-size: 18px; margin-bottom: 4px; }
  .sidebar-header h2 { font-size: 12px; }
  .sidebar-header .sub { display: none; }

  /* 景点列表横向滚动 */
  .scenic-list { flex-direction: row; padding: 8px; gap: 8px; flex-shrink: 0; }
  .scenic-item { flex-shrink: 0; padding: 6px 10px; }
  .scenic-item .desc { display: none; }

  /* Live2D 区域隐藏（移动端不显示数字人） */
  .live2d-section { display: none; }
  .status-bar { display: none; }

  /* 主区占满 */
  .main { flex: 1; height: 62vh; }
  .msg { max-width: 85%; }
  .messages { padding: 12px 16px; }
  .quick-actions { padding: 6px 16px 2px; gap: 6px; }
  .quick-btn { font-size: 11px; padding: 6px 12px; }
  .input-area { padding: 10px 16px 14px; }
  .footer { font-size: 9px; padding: 6px 12px; }
  .footer span:last-child { display: none; }
}

/* ═══════════════════════════════════════════════════════════
   响应式 — 480px 断点（手机）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 480px) {
  .chat-header { padding: 10px 14px; }
  .chat-header .logo { font-size: 15px; }
  .chat-header .badge { font-size: 10px; }
  .messages { padding: 10px 12px; gap: 12px; }
  .msg { max-width: 90%; padding: 10px 12px; font-size: 13px; }
  .quick-actions { padding: 4px 12px 2px; gap: 4px; flex-wrap: wrap; }
  .quick-btn { font-size: 10px; padding: 5px 10px; }
  .input-area { padding: 8px 12px 12px; gap: 8px; }
  .input-area input { padding: 8px 12px; font-size: 16px; border-radius: 10px; }
  .btn { width: 36px; height: 36px; font-size: 16px; }
  .footer { display: none; }

  /* 底部抽屉更紧凑 */
  .sidebar { max-height: 30vh; }
  .sidebar-header { padding: 8px 10px; }
  .sidebar-header .logo-icon { width: 32px; height: 32px; font-size: 16px; }
  .scenic-item { padding: 5px 8px; }
  .scenic-item .name { font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ═══════════════════════════════════════════════════════
       景点侧栏 240px
       ═══════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🏔️</div>
      <h2>西湖十景</h2>
      <div class="sub">West Lake · Ten Scenes</div>
    </div>

    <!-- 景点快捷入口 -->
    <div class="scenic-list">
      <div class="scenic-item" data-query="请介绍一下三潭印月">
        <span class="emoji">🏛️</span>
        <div class="info">
          <div class="name">三潭印月</div>
          <div class="desc">西湖第一胜景</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下苏堤春晓">
        <span class="emoji">🌿</span>
        <div class="info">
          <div class="name">苏堤春晓</div>
          <div class="desc">春日漫步好去处</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下断桥残雪">
        <span class="emoji">🌉</span>
        <div class="info">
          <div class="name">断桥残雪</div>
          <div class="desc">许仙白娘子相会</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下雷峰夕照">
        <span class="emoji">🌅</span>
        <div class="info">
          <div class="name">雷峰夕照</div>
          <div class="desc">雷锋塔下夕阳红</div>
        </div>
      </div>
    </div>

    <!-- Live2D 数字人容器（磨砂玻璃） -->
    <div class="live2d-section">
      <canvas id="live2d-canvas"></canvas>
      <div class="avatar-fallback show" id="avatar-fallback">
        <div class="icon">🗣️</div>
        <div class="label">数字人导游 · 小西</div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-dot online" id="status-dot"></span>
      <span id="status-text">在线 · 随时为你服务</span>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════
       主区：对话
       ═══════════════════════════════════════════════════════ -->
  <main class="main">
    <!-- 导航栏 #2d6a4f 白字 -->
    <div class="chat-header">
      <div class="logo">杭州西湖 · 智慧导览</div>
      <span class="badge">AI 小西</span>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages"></div>

    <!-- 4 个快捷按钮 -->
    <div class="quick-actions">
      <button class="quick-btn" data-query="请介绍一下西湖十景">🏛️ 西湖十景介绍</button>
      <button class="quick-btn" data-query="西湖各景点门票价格是多少？">🎫 票价查询</button>
      <button class="quick-btn" data-query="西湖附近有什么好吃的？">🍜 美食推荐</button>
      <button class="quick-btn" data-query="推荐一条半日游路线">🗺️ 游览路线</button>
    </div>

    <!-- 打字动画 -->
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" id="text-input" placeholder="输入你的问题，例如「西湖有哪些景点？」" />
      <button class="btn voice" id="voice-btn" title="语音输入">🎤</button>
      <button class="btn" id="send-btn" title="发送">➤</button>
    </div>

    <!-- 底部 footer -->
    <footer class="footer">
      <span>第十五届"中国软件杯" A5 赛题 · 景区导览AI数字人</span>
      <span>基于 Open-LLM-VTuber · DeepSeek · Dify RAG · FunASR · Edge-TTS · Live2D</span>
    </footer>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  A5 · 景区导览 AI 数字人 — 前端逻辑
// ═══════════════════════════════════════════════════════════

(function() {
  'use strict';

  // ── DOM 引用 ──
  const $ = id => document.getElementById(id);
  const messagesEl = $('messages');
  const inputEl = $('text-input');
  const sendBtn = $('send-btn');
  const voiceBtn = $('voice-btn');
  const typingEl = $('typing');
  const statusDot = $('status-dot');
  const statusText = $('status-text');
  const canvas = $('live2d-canvas');
  const fallback = $('avatar-fallback');

  // ── 状态 ──
  let isRecording = false;
  let recognition = null;
  let mediaRecorder = null;
  let audioChunks = [];

  // ── 添加消息 ──
  function addMessage(text, role, audioUrl) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const timeSpan = document.createElement('div');
    timeSpan.className = 'time';
    timeSpan.textContent = time;
    div.textContent = text;
    div.appendChild(timeSpan);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    if (role === 'bot' && audioUrl) {
      const audio = new Audio(audioUrl);
      audio.play().catch(e => console.warn('自动播放被阻止:', e));
      setSpeaking(true);
      audio.onended = () => setSpeaking(false);
      audio.onerror = () => setSpeaking(false);
    }
  }

  // ── 设置状态 ──
  function setSpeaking(speaking) {
    if (speaking) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在播报…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  function setListening(listening) {
    if (listening) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在聆听…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  // ── 显示打字动画 ──
  function showTyping(show) {
    if (show) {
      typingEl.classList.add('show');
    } else {
      typingEl.classList.remove('show');
    }
  }

  // ── 发送文字消息 ──
  async function sendTextMessage(text) {
    if (!text.trim()) return;
    addMessage(text, 'user');
    inputEl.value = '';
    sendBtn.disabled = true;
    showTyping(true);

    try {
      const resp = await fetch('/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text }),
      });
      const data = await resp.json();
      showTyping(false);
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('网络连接失败，请检查服务是否运行。', 'bot');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── 发送语音消息 ──
  async function sendVoiceMessage(audioBlob, asrText) {
    if (!audioBlob && !asrText) return;
    if (asrText) addMessage(asrText, 'user');
    else addMessage('🎤 语音消息', 'user');
    showTyping(true);

    try {
      const formData = new FormData();
      if (audioBlob) formData.append('audio', audioBlob, 'voice.webm');
      formData.append('text', asrText || '');
      const resp = await fetch('/chat/voice', { method: 'POST', body: formData });
      const data = await resp.json();
      showTyping(false);
      if (data.asr_text && !asrText) {
        messagesEl.lastChild.textContent = data.asr_text;
      }
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('语音处理失败，请重试或使用文字输入。', 'bot');
    }
  }

  // ── 事件绑定 ──

  // 发送按钮
  sendBtn.addEventListener('click', () => sendTextMessage(inputEl.value));

  // 回车发送
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTextMessage(inputEl.value);
    }
  });

  // ── 快捷按钮事件 ──
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const query = btn.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ── 景点侧栏事件 ──
  document.querySelectorAll('.scenic-item').forEach(item => {
    item.addEventListener('click', () => {
      const query = item.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ═════════════════════════════════════════════════════════
  //  语音输入：Web Speech API (降级 ASR)
  // ═════════════════════════════════════════════════════════

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = event => {
      const transcript = event.results[0][0].transcript;
      setListening(false);
      voiceBtn.className = 'btn voice';
      sendTextMessage(transcript);
    };

    recognition.onerror = event => {
      console.warn('语音识别错误:', event.error);
      setListening(false);
      voiceBtn.className = 'btn voice';
      if (event.error === 'no-speech') {
        addMessage('没有检测到语音，请重试。', 'bot');
      }
    };

    recognition.onend = () => {
      setListening(false);
      voiceBtn.className = 'btn voice';
    };

    voiceBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      isRecording = true;
      voiceBtn.className = 'btn voice recording';
      setListening(true);

      try { recognition.start(); }
      catch (e) { console.warn('Web Speech 启动失败:', e); }

      if (navigator.mediaDevices) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(stream => {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
            mediaRecorder.start();
            setTimeout(() => {
              if (isRecording) {
                recognition.stop();
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                  mediaRecorder.stop();
                }
                isRecording = false;
                voiceBtn.className = 'btn voice';
                setListening(false);
              }
            }, 8000);
          })
          .catch(err => console.warn('麦克风权限被拒绝:', err));
      }
    });
  } else {
    voiceBtn.addEventListener('click', async () => {
      if (isRecording) {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          setListening(false);
          await sendVoiceMessage(blob, '');
        };
        mediaRecorder.start();
        isRecording = true;
        voiceBtn.className = 'btn voice recording';
        setListening(true);
        setTimeout(() => {
          if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            voiceBtn.className = 'btn voice';
            setListening(false);
          }
        }, 10000);
      } catch (err) {
        addMessage('需要麦克风权限才能使用语音输入。', 'bot');
        voiceBtn.className = 'btn voice';
      }
    });
  }

  // ── Live2D 集成 (Cubism SDK) ──
  async function initLive2D() {
    const modelPath = '/static/live2d/default/';
    try {
      const resp = await fetch(modelPath + 'model.model3.json', { method: 'HEAD' });
      if (!resp.ok) { return; }
    } catch {
      return;
    }
    fallback.classList.remove('show');
    try { await loadCubismSDK(); }
    catch (err) {
      console.warn('Live2D SDK 加载失败:', err);
      fallback.classList.add('show');
    }
  }

  async function loadCubismSDK() {
    // Cubism 4 WebGL SDK 集成钩子（待实现）
  }

  // 初始化
  initLive2D();
  inputEl.focus();

  // 欢迎消息
  setTimeout(() => {
    addMessage('你好！我是西湖导游小西 🏔️，欢迎来杭州西湖游玩！你可以问我关于景点、美食、路线等问题。', 'bot');
  }, 500);

})();
</script>
</body>
</html>
