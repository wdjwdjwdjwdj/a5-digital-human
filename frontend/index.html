<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>杭州西湖 · 水墨导览</title>
<style>
/* ═══════════════════════════════════════════════════════════
   水墨画风主题 — 杭州西湖 · 智慧导览
   墨绿 #2c3e2d / 宣纸 #f5f0e8 / 赭石 #8b4513 / 墨色 #3a3226
   ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap');

:root {
  --primary: #2c3e2d;
  --primary-light: #3d5a3e;
  --primary-dark: #1a2a1b;
  --bg: #f5f0e8;
  --accent: #8b4513;
  --accent-light: #c1783e;
  --text: #3a3226;
  --text-light: #8c8070;
  --surface: rgba(255,252,245,0.95);
  --shadow: 0 4px 24px rgba(0,0,0,.06);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Serif SC", "PingFang SC", "STSong", "SimSun", serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 30%, rgba(44,62,45,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 60%, rgba(139,69,19,.05) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 85%, rgba(44,62,45,.04) 0%, transparent 45%),
    linear-gradient(180deg, transparent 0%, rgba(139,69,19,.02) 100%);
  color: var(--text);
  height: 100vh; overflow: hidden;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q40 15 30 25 Q20 15 30 5' fill='none' stroke='%238c8070' stroke-width='.3' opacity='.15'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ── 布局 ── */
.app { display: flex; height: 100vh; }

/* ═══════════════════════════════════════════════════════════
   景点侧栏 240px
   ═══════════════════════════════════════════════════════════ */
.sidebar {
  width: 240px; min-width: 240px;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(0,0,0,.06);
}

/* 侧栏头部 */
.sidebar-header {
  padding: 22px 16px 14px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.sidebar-header .logo-icon {
  width: 52px; height: 52px; margin: 0 auto 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  box-shadow: 0 4px 16px rgba(45,106,79,.25);
}
.sidebar-header h2 {
  font-size: 14px; font-weight: 600;
  color: var(--primary); letter-spacing: 2px;
}
.sidebar-header .sub {
  font-size: 11px; color: var(--text-light); margin-top: 3px;
}

/* 景点列表 */
.scenic-list {
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.scenic-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.55);
  cursor: pointer; user-select: none;
  transition: all .2s;
  border: 1px solid transparent;
}
.scenic-item:hover {
  background: rgba(45,106,79,.08);
  border-color: rgba(45,106,79,.15);
  transform: translateX(4px);
}
.scenic-item:active {
  transform: translateX(2px);
  background: rgba(45,106,79,.12);
}
.scenic-item .emoji { font-size: 20px; line-height: 1; }
.scenic-item .info { min-width: 0; }
.scenic-item .name { font-size: 13px; font-weight: 500; color: var(--text); }
.scenic-item .desc { font-size: 11px; color: var(--text-light); margin-top: 1px; }

/* Live2D 容器 — 磨砂玻璃效果 */
.live2d-section {
  flex: 1; margin: 6px 12px 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(45,106,79,.04) 0%, rgba(254,250,224,.4) 100%);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.5);
}
#live2d-canvas { width: 100%; height: 100%; object-fit: contain; }
.avatar-fallback {
  display: none; flex-direction: column; align-items: center; gap: 6px;
  color: var(--primary);
}
.avatar-fallback .icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; color: #fff;
  box-shadow: 0 6px 24px rgba(45,106,79,.25);
}
.avatar-fallback .label { font-size: 12px; opacity: .65; }
.avatar-fallback.show { display: flex; }

/* 状态栏 */
.status-bar {
  padding: 10px 16px;
  border-top: 1px solid rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 8px; font-size: 12px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #9ca3af; transition: background .3s;
}
.status-dot.online { background: #22c55e; }
.status-dot.speaking { background: var(--accent); animation: pulse .6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══════════════════════════════════════════════════════════
   主区
   ═══════════════════════════════════════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column;
  background: transparent;
}

/* ── 导航栏 ── */
.chat-header {
  padding: 14px 24px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 16px rgba(44,62,45,.2);
  position: relative; z-index: 1;
}
.chat-header .logo {
  font-family: "Ma Shan Zheng", "KaiTi", cursive;
  font-size: 20px; font-weight: 400;
  color: #fff; letter-spacing: 3px;
}
.chat-header .badge {
  background: rgba(255,255,255,.15);
  color: #fff; font-size: 10px;
  padding: 2px 10px; border-radius: 20px;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
}

/* ── 消息区 ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 14px;
  position: relative; z-index: 1;
}
.msg {
  max-width: 75%; padding: 12px 16px;
  border-radius: var(--radius-sm);
  line-height: 1.7; font-size: 14px;
  animation: fadeIn .3s ease;
  position: relative;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* 用户气泡：水墨笔触边框 */
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #f5f0e8;
  border-bottom-right-radius: 2px;
  box-shadow: 0 2px 12px rgba(44,62,45,.15);
  border: 1px solid rgba(255,255,255,.1);
}
/* AI 气泡：宣纸质感 */
.msg.bot {
  align-self: flex-start;
  background: var(--surface);
  color: var(--text);
  border-bottom-left-radius: 2px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,69,19,.12);
  border-left: 3px solid var(--accent);
}
.msg .time {
  font-size: 10px; opacity: .5; margin-top: 6px; text-align: right;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
  writing-mode: horizontal-tb;
}
.msg.bot .time { color: var(--text-light); }

/* ── 快捷入口 × 5 ── */
.quick-actions {
  display: flex; gap: 8px;
  padding: 8px 24px 4px;
  flex-wrap: wrap;
}
.quick-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 14px;
  border: 1px solid rgba(44,62,45,.15);
  border-radius: 6px;
  background: var(--surface);
  color: var(--primary);
  font-size: 12px;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
  cursor: pointer; user-select: none;
  transition: all .2s;
  white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.quick-btn:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(44,62,45,.18);
}
.quick-btn:active {
  transform: translateY(0);
  background: var(--primary-dark);
}

/* ── 人群标签 ── */
.crowd-tags {
  display: flex; gap: 6px;
  padding: 4px 24px 8px;
  flex-wrap: wrap;
}
.crowd-tag {
  padding: 5px 12px;
  border: 1px solid rgba(139,69,19,.2);
  border-radius: 16px;
  background: rgba(255,252,245,.7);
  color: var(--accent);
  font-size: 11px;
  cursor: pointer; user-select: none;
  transition: all .2s;
  font-family: "ZCOOL XiaoWei", "KaiTi", serif;
}
.crowd-tag:hover, .crowd-tag.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* ── 底部 footer ── */
.footer {
  padding: 8px 24px;
  background: var(--primary-dark);
  color: rgba(255,255,255,.6);
  font-size: 11px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}

/* ── 打字动画 ── */
.typing {
  align-self: flex-start;
  margin: 4px 24px;
  background: var(--surface);
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  display: none; gap: 4px;
  box-shadow: var(--shadow);
  /* 脱离正常流，避免布局抖动 */
  position: absolute;
  z-index: 1;
  transition: opacity .15s;
  opacity: 0; pointer-events: none;
}
.typing.show {
  display: flex;
  opacity: 1;
  pointer-events: auto;
  position: relative;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* ── 输入区 ── */
.input-area {
  padding: 10px 24px 16px;
  display: flex; gap: 10px; align-items: center;
}
.input-area input {
  flex: 1; padding: 10px 16px;
  border: 2px solid #40916c;
  border-radius: 12px;
  font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  background: rgba(255,255,255,.85);
}
.input-area input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45,106,79,.12);
}
.input-area input::placeholder { color: var(--text-light); }

/* 按钮 #2d6a4f, hover #1b4332 */
.btn {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all .2s;
  background: var(--primary); color: #fff; flex-shrink: 0;
}
.btn:hover { background: var(--primary-dark); transform: scale(1.05); }
.btn:active { transform: scale(.95); }
.btn.voice { background: var(--accent); }
.btn.voice:hover { background: #c49463; }
.btn.voice.recording { background: #ef4444; animation: pulse-red .8s ease-in-out infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ── 滚动条 ── */
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* ═══════════════════════════════════════════════════════════
   响应式 — 768px 断点（平板/小桌面）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .app { flex-direction: column-reverse; }

  /* 侧栏变为底部抽屉 */
  .sidebar {
    width: 100%; min-width: 0; max-height: 38vh;
    flex-direction: row; overflow-x: auto;
    border-right: none; border-top: 1px solid rgba(0,0,0,.06);
  }
  .sidebar-header { padding: 10px 12px; border-bottom: none; border-right: 1px solid rgba(0,0,0,.05); flex-shrink: 0; }
  .sidebar-header .logo-icon { width: 36px; height: 36px; font-size: 18px; margin-bottom: 4px; }
  .sidebar-header h2 { font-size: 12px; }
  .sidebar-header .sub { display: none; }

  /* 景点列表横向滚动 */
  .scenic-list { flex-direction: row; padding: 8px; gap: 8px; flex-shrink: 0; }
  .scenic-item { flex-shrink: 0; padding: 6px 10px; }
  .scenic-item .desc { display: none; }

  /* Live2D 区域隐藏（移动端不显示数字人） */
  .live2d-section { display: none; }
  .status-bar { display: none; }

  /* 主区占满 */
  .main { flex: 1; height: 62vh; }
  .msg { max-width: 85%; }
  .messages { padding: 12px 16px; }
  .quick-actions { padding: 6px 16px 2px; gap: 6px; }
  .quick-btn { font-size: 11px; padding: 6px 12px; }
  .input-area { padding: 10px 16px 14px; }
  .footer { font-size: 9px; padding: 6px 12px; }
  .footer span:last-child { display: none; }
}

/* ═══════════════════════════════════════════════════════════
   响应式 — 480px 断点（手机）
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 480px) {
  .chat-header { padding: 10px 14px; }
  .chat-header .logo { font-size: 15px; }
  .chat-header .badge { font-size: 10px; }
  .messages { padding: 10px 12px; gap: 12px; }
  .msg { max-width: 90%; padding: 10px 12px; font-size: 13px; }
  .quick-actions { padding: 4px 12px 2px; gap: 4px; flex-wrap: wrap; }
  .quick-btn { font-size: 10px; padding: 5px 10px; }
  .input-area { padding: 8px 12px 12px; gap: 8px; }
  .input-area input { padding: 8px 12px; font-size: 16px; border-radius: 10px; }
  .btn { width: 36px; height: 36px; font-size: 16px; }
  .footer { display: none; }

  /* 底部抽屉更紧凑 */
  .sidebar { max-height: 30vh; }
  .sidebar-header { padding: 8px 10px; }
  .sidebar-header .logo-icon { width: 32px; height: 32px; font-size: 16px; }
  .scenic-item { padding: 5px 8px; }
  .scenic-item .name { font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- ═══════════════════════════════════════════════════════
       景点侧栏 240px
       ═══════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🏔️</div>
      <h2>西湖十景</h2>
      <div class="sub">West Lake · Ten Scenes</div>
    </div>

    <!-- 景点快捷入口 -->
    <div class="scenic-list">
      <div class="scenic-item" data-query="请介绍一下三潭印月">
        <span class="emoji">🏛️</span>
        <div class="info">
          <div class="name">三潭印月</div>
          <div class="desc">西湖第一胜景</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下苏堤春晓">
        <span class="emoji">🌿</span>
        <div class="info">
          <div class="name">苏堤春晓</div>
          <div class="desc">春日漫步好去处</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下断桥残雪">
        <span class="emoji">🌉</span>
        <div class="info">
          <div class="name">断桥残雪</div>
          <div class="desc">许仙白娘子相会</div>
        </div>
      </div>
      <div class="scenic-item" data-query="请介绍一下雷峰夕照">
        <span class="emoji">🌅</span>
        <div class="info">
          <div class="name">雷峰夕照</div>
          <div class="desc">雷锋塔下夕阳红</div>
        </div>
      </div>
    </div>

    <!-- Live2D 数字人容器（磨砂玻璃） -->
    <div class="live2d-section">
      <canvas id="live2d-canvas"></canvas>
      <div class="avatar-fallback show" id="avatar-fallback">
        <div class="icon">🗣️</div>
        <div class="label">数字人导游 · 小西</div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-dot online" id="status-dot"></span>
      <span id="status-text">在线 · 随时为你服务</span>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════
       主区：对话
       ═══════════════════════════════════════════════════════ -->
  <main class="main">
    <!-- 导航栏 -->
    <div class="chat-header">
      <div class="logo">杭州西湖 · 水墨导览</div>
      <span class="badge">AI 小西</span>
    </div>

    <!-- 消息列表 -->
    <div class="messages" id="messages"></div>

    <!-- 人群属性标签 -->
    <div class="crowd-tags" id="crowd-tags">
      <button class="crowd-tag" data-query="推荐一条适合家庭出游的西湖路线，有老人小孩">👨‍👩‍👧‍👦 家庭</button>
      <button class="crowd-tag" data-query="推荐一条适合情侣约会的西湖浪漫路线">💑 情侣</button>
      <button class="crowd-tag" data-query="推荐一条适合朋友结伴的西湖打卡路线">👫 朋友</button>
      <button class="crowd-tag" data-query="推荐一条适合老年人游西湖的轻松路线，少走路">👴 老人</button>
      <button class="crowd-tag" data-query="推荐一条适合小朋友游西湖的亲子路线">👶 儿童</button>
    </div>

    <!-- 5 个实用快捷入口 -->
    <div class="quick-actions">
      <button class="quick-btn" data-query="西湖附近有什么好吃的推荐？住宿在哪里比较方便？">🍜 吃住推荐</button>
      <button class="quick-btn" data-query="去西湖怎么坐地铁和公交？自驾停哪里？">🚇 交通指引</button>
      <button class="quick-btn" data-query="推荐一条西湖一日游路线">🗺️ 路线推荐</button>
      <button class="quick-btn" data-query="西湖有哪些景点？请全部介绍一下">🏛️ 景点汇总</button>
      <button class="quick-btn" id="toilet-btn">🚻 厕所位置</button>
    </div>

    <!-- 打字动画 -->
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" id="text-input" placeholder="请输入您的问题…" />
      <button class="btn voice" id="voice-btn" title="语音输入">🎤</button>
      <button class="btn" id="send-btn" title="发送">↩</button>
    </div>

    <!-- 底部 footer -->
    <footer class="footer">
      <span>第十五届"中国软件杯" A5 赛题 · 景区导览AI数字人</span>
      <span>水墨画风 · DeepSeek · FunASR · Edge-TTS · Live2D</span>
    </footer>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  A5 · 景区导览 AI 数字人 — 前端逻辑
// ═══════════════════════════════════════════════════════════

(function() {
  'use strict';

  // ── DOM 引用 ──
  const $ = id => document.getElementById(id);
  const messagesEl = $('messages');
  const inputEl = $('text-input');
  const sendBtn = $('send-btn');
  const voiceBtn = $('voice-btn');
  const typingEl = $('typing');
  const statusDot = $('status-dot');
  const statusText = $('status-text');
  const canvas = $('live2d-canvas');
  const fallback = $('avatar-fallback');

  // ── 状态 ──
  let isRecording = false;
  let recognition = null;
  let mediaRecorder = null;
  let audioChunks = [];
  const CHAT_STORAGE_KEY = 'a5_chat_history';
  const MAX_HISTORY = 50;

  // ── localStorage 持久化 ──
  function saveHistory() {
    const msgs = [];
    messagesEl.querySelectorAll('.msg').forEach(el => {
      msgs.push({
        role: el.classList.contains('user') ? 'user' : 'bot',
        text: el.childNodes[0] ? el.childNodes[0].textContent : '',
        time: el.querySelector('.time') ? el.querySelector('.time').textContent : '',
      });
    });
    if (msgs.length > MAX_HISTORY) msgs.splice(0, msgs.length - MAX_HISTORY);
    try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(msgs)); } catch(e) {}
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(CHAT_STORAGE_KEY);
      if (!raw) return false;
      const msgs = JSON.parse(raw);
      if (!msgs.length) return false;
      msgs.forEach(m => addMessage(m.text, m.role));
      return true;
    } catch(e) { return false; }
  }

  // ── 添加消息 ──
  function addMessage(text, role, audioUrl) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const timeSpan = document.createElement('div');
    timeSpan.className = 'time';
    timeSpan.textContent = time;
    div.textContent = text;
    div.appendChild(timeSpan);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    saveHistory();

    if (role === 'bot' && audioUrl) {
      const audio = new Audio(audioUrl);
      audio.play().catch(e => console.warn('自动播放被阻止:', e));
      setSpeaking(true);
      audio.onended = () => setSpeaking(false);
      audio.onerror = () => setSpeaking(false);
    }
  }

  // ── 设置状态 ──
  function setSpeaking(speaking) {
    if (speaking) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在播报…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  function setListening(listening) {
    if (listening) {
      statusDot.className = 'status-dot speaking';
      statusText.textContent = '正在聆听…';
    } else {
      statusDot.className = 'status-dot online';
      statusText.textContent = '在线 · 随时为你服务';
    }
  }

  // ── 显示打字动画 ──
  function showTyping(show) {
    if (show) {
      typingEl.classList.add('show');
    } else {
      typingEl.classList.remove('show');
    }
  }

  // ── 发送文字消息 ──
  async function sendTextMessage(text) {
    if (!text.trim()) return;
    addMessage(text, 'user');
    inputEl.value = '';
    sendBtn.disabled = true;
    showTyping(true);

    try {
      const resp = await fetch('/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text }),
      });
      const data = await resp.json();
      showTyping(false);
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('网络连接失败，请检查服务是否运行。', 'bot');
    } finally {
      sendBtn.disabled = false;
    }
  }

  // ── 发送语音消息 ──
  async function sendVoiceMessage(audioBlob, asrText) {
    if (!audioBlob && !asrText) return;
    if (asrText) addMessage(asrText, 'user');
    else addMessage('🎤 语音消息', 'user');
    showTyping(true);

    try {
      const formData = new FormData();
      if (audioBlob) formData.append('audio', audioBlob, 'voice.webm');
      formData.append('text', asrText || '');
      const resp = await fetch('/chat/voice', { method: 'POST', body: formData });
      const data = await resp.json();
      showTyping(false);
      if (data.asr_text && !asrText) {
        messagesEl.lastChild.textContent = data.asr_text;
      }
      addMessage(data.reply, 'bot', data.audio_url || null);
    } catch (err) {
      showTyping(false);
      addMessage('语音处理失败，请重试或使用文字输入。', 'bot');
    }
  }

  // ── 事件绑定 ──

  // 发送按钮
  sendBtn.addEventListener('click', () => sendTextMessage(inputEl.value));

  // 回车发送
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTextMessage(inputEl.value);
    }
  });

  // ── 快捷按钮事件 ──
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const query = btn.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ── 厕所按钮 ──
  const toiletBtn = document.getElementById('toilet-btn');
  if (toiletBtn) {
    toiletBtn.addEventListener('click', () => {
      const toiletInfo = [
        '🚻 西湖周边公共厕所位置：\n',
        '1. 断桥入口 — 北山街断桥入口处',
        '2. 苏堤南口 — 南山路苏堤入口',
        '3. 花港观鱼 — 花港公园内',
        '4. 雷峰塔 — 雷峰塔景区入口旁',
        '5. 三潭印月 — 湖滨码头售票处旁',
        '6. 音乐喷泉 — 湖滨路音乐喷泉广场',
        '7. 白堤中段 — 平湖秋月旁',
        '8. 柳浪闻莺 — 柳浪闻莺公园内',
        '\n💡 所有厕所均免费开放，部分有第三卫生间。'
      ].join('\n');
      addMessage('🚻 西湖厕所位置', 'user');
      addMessage(toiletInfo, 'bot');
    });
  }

  // ── 人群标签事件 ──
  document.querySelectorAll('.crowd-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const query = tag.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ── 景点侧栏事件 ──
  document.querySelectorAll('.scenic-item').forEach(item => {
    item.addEventListener('click', () => {
      const query = item.getAttribute('data-query');
      if (query) sendTextMessage(query);
    });
  });

  // ═════════════════════════════════════════════════════════
  //  语音输入：Web Speech API (降级 ASR)
  // ═════════════════════════════════════════════════════════

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = event => {
      const transcript = event.results[0][0].transcript;
      setListening(false);
      voiceBtn.className = 'btn voice';
      sendTextMessage(transcript);
    };

    recognition.onerror = event => {
      console.warn('语音识别错误:', event.error);
      setListening(false);
      voiceBtn.className = 'btn voice';
      if (event.error === 'no-speech') {
        addMessage('没有检测到语音，请重试。', 'bot');
      }
    };

    recognition.onend = () => {
      setListening(false);
      voiceBtn.className = 'btn voice';
    };

    voiceBtn.addEventListener('click', () => {
      if (isRecording) {
        recognition.stop();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      isRecording = true;
      voiceBtn.className = 'btn voice recording';
      setListening(true);

      try { recognition.start(); }
      catch (e) { console.warn('Web Speech 启动失败:', e); }

      if (navigator.mediaDevices) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(stream => {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
            mediaRecorder.start();
            setTimeout(() => {
              if (isRecording) {
                recognition.stop();
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                  mediaRecorder.stop();
                }
                isRecording = false;
                voiceBtn.className = 'btn voice';
                setListening(false);
              }
            }, 8000);
          })
          .catch(err => console.warn('麦克风权限被拒绝:', err));
      }
    });
  } else {
    voiceBtn.addEventListener('click', async () => {
      if (isRecording) {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
        isRecording = false;
        voiceBtn.className = 'btn voice';
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          setListening(false);
          await sendVoiceMessage(blob, '');
        };
        mediaRecorder.start();
        isRecording = true;
        voiceBtn.className = 'btn voice recording';
        setListening(true);
        setTimeout(() => {
          if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            voiceBtn.className = 'btn voice';
            setListening(false);
          }
        }, 10000);
      } catch (err) {
        addMessage('需要麦克风权限才能使用语音输入。', 'bot');
        voiceBtn.className = 'btn voice';
      }
    });
  }

  // ── Live2D 集成 (Cubism SDK) ──
  async function initLive2D() {
    const modelPath = '/static/live2d/default/';
    try {
      const resp = await fetch(modelPath + 'model.model3.json', { method: 'HEAD' });
      if (!resp.ok) { return; }
    } catch {
      return;
    }
    fallback.classList.remove('show');
    try { await loadCubismSDK(); }
    catch (err) {
      console.warn('Live2D SDK 加载失败:', err);
      fallback.classList.add('show');
    }
  }

  async function loadCubismSDK() {
    // Cubism 4 WebGL SDK 集成钩子（待实现）
  }

  // ── 初始化 ──
  initLive2D();

  // 尝试恢复历史对话
  const hasHistory = loadHistory();
  if (!hasHistory) {
    // 首次访问：AI 主动欢迎引导
    setTimeout(() => {
      addMessage('🏔️ 欢迎来到杭州西湖！我是您的智能导游 **小西**。\n\n在为您推荐路线之前，想先了解您的情况：\n\n👥 **和谁一起？** — 家庭出游 / 情侣约会 / 朋友结伴 / 带老人 / 带小朋友\n🚗 **出行方式？** — 自驾 / 地铁 / 公交 / 打车\n⏰ **游玩时长？** — 半天 / 一天 / 两天\n💰 **预算偏好？** — 经济实惠 / 适中 / 奢华体验\n\n您可以点击下方标签或直接告诉我哦～', 'bot');
    }, 500);
  }

})();
</script>
